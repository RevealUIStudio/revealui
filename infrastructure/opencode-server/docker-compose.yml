version: '3.8'

services:
  # Main OpenCode service
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-server
    
    # Environment variables
    environment:
      # AI Provider Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      
      # OpenCode Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - OPENCODE_CONFIG_DIR=/home/opencode/.config/opencode
      
      # Optional: Git configuration
      - GIT_USER_NAME=${GIT_USER_NAME:-OpenCode}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-opencode@localhost}
    
    # Volumes
    volumes:
      # Mount your project code
      - ${PROJECT_PATH:-./workspace}:/workspace:rw
      
      # Persist OpenCode configuration
      - opencode-config:/home/opencode/.config/opencode
      
      # SSH keys (optional, for git operations)
      - ${SSH_KEY_PATH:-~/.ssh}:/home/opencode/.ssh:ro
      
      # Node modules cache
      - node-cache:/home/opencode/.npm
    
    # Working directory
    working_dir: /workspace
    
    # Interactive mode for CLI
    stdin_open: true
    tty: true
    
    # Network
    networks:
      - opencode-network
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Restart policy
    restart: unless-stopped
    
    # Command - can be overridden
    command: ["opencode"]

  # Optional: Persistent API server wrapper
  # This would require building a custom API wrapper around OpenCode
  opencode-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-api
    environment:
      - NODE_ENV=production
      - API_PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ${PROJECT_PATH:-./workspace}:/workspace:rw
      - opencode-config:/home/opencode/.config/opencode
    networks:
      - opencode-network
    profiles:
      - api  # Only start with --profile api
    command: ["echo", "API mode requires custom implementation"]

networks:
  opencode-network:
    driver: bridge
    name: opencode-network

volumes:
  opencode-config:
    name: opencode-config
  node-cache:
    name: opencode-node-cache
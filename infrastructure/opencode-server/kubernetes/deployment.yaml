apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-server
  namespace: opencode
  labels:
    app: opencode-server
    version: v1
spec:
  replicas: 1
  strategy:
    type: Recreate  # Since it's a CLI tool, we can't have multiple instances
  selector:
    matchLabels:
      app: opencode-server
  template:
    metadata:
      labels:
        app: opencode-server
        version: v1
    spec:
      serviceAccountName: opencode-server
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: opencode
        image: opencode-server:latest
        imagePullPolicy: Always
        command: ["opencode"]
        args: ["--watch", "/workspace"]
        envFrom:
        - configMapRef:
            name: opencode-config
        - secretRef:
            name: opencode-secrets
        env:
        - name: NODE_ENV
          value: "production"
        - name: HOME
          value: "/home/opencode"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
          readOnly: false
        - name: opencode-config
          mountPath: /home/opencode/.config/opencode
        - name: ssh-keys
          mountPath: /home/opencode/.ssh
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "opencode --version"
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "test -d /workspace"
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: opencode-workspace
      - name: opencode-config
        persistentVolumeClaim:
          claimName: opencode-config
      - name: ssh-keys
        secret:
          secretName: opencode-ssh-keys
          defaultMode: 0400
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - key: "opencode"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      restartPolicy: Always
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-api-gateway
  namespace: opencode
spec:
  replicas: 2  # Multiple replicas for HA
  selector:
    matchLabels:
      app: opencode-api-gateway
  template:
    metadata:
      labels:
        app: opencode-api-gateway
    spec:
      containers:
      - name: api
        image: node:22-alpine
        command: ["node", "/app/api-server.js"]
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: TASK_DIR
          value: "/tasks"
        - name: NODE_ENV
          value: "production"
        volumeMounts:
        - name: api-server
          mountPath: /app
        - name: tasks
          mountPath: /tasks
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: api-server
        configMap:
          name: opencode-api-server
      - name: tasks
        persistentVolumeClaim:
          claimName: opencode-tasks

---
apiVersion: v1
kind: Service
metadata:
  name: opencode-api
  namespace: opencode
spec:
  selector:
    app: opencode-api-gateway
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencode-api
  namespace: opencode
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - host: opencode.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opencode-api
            port:
              number: 80
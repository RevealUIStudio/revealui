apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-config
  namespace: opencode
data:
  NODE_ENV: "production"
  GIT_USER_NAME: "OpenCode"
  GIT_USER_EMAIL: "opencode@localhost"
  # Add any non-sensitive configuration here

---
apiVersion: v1
kind: Secret
metadata:
  name: opencode-secrets
  namespace: opencode
type: Opaque
stringData:
  # AI Provider API Keys (add your actual keys)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: opencode-ssh-keys
  namespace: opencode
type: Opaque
stringData:
  # Base64 encoded SSH private key
  # Generate with: cat ~/.ssh/id_rsa | base64 -w0
  id_rsa: ""
  id_rsa.pub: ""
  config: |
    Host github.com
      StrictHostKeyChecking no
      UserKnownHostsFile /dev/null
  known_hosts: ""
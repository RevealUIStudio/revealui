apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-api-server
  namespace: opencode
data:
  api-server.js: |
    const express = require('express');
    const fs = require('fs').promises;
    const path = require('path');
    const { exec } = require('child_process');
    const { promisify } = require('util');
    const execAsync = promisify(exec);

    const app = express();
    const PORT = process.env.PORT || 3000;
    const TASK_DIR = process.env.TASK_DIR || '/tasks';

    app.use(express.json());

    // Health checks
    app.get('/health', (req, res) => {
      res.json({ status: 'healthy', timestamp: new Date().toISOString() });
    });

    app.get('/ready', (req, res) => {
      res.json({ status: 'ready', timestamp: new Date().toISOString() });
    });

    // Submit a new task
    app.post('/api/tasks', async (req, res) => {
      try {
        const { command, cwd = '/workspace', timeout = 3600, retries = 0 } = req.body;
        
        if (!command) {
          return res.status(400).json({ error: 'Command is required' });
        }

        // Generate task ID
        const taskId = `task-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
        
        // Create task file
        const task = {
          id: taskId,
          command,
          cwd,
          timeout,
          retries,
          status: 'pending',
          created_at: new Date().toISOString(),
          start_time: null,
          end_time: null,
          output: null,
          exit_code: null
        };

        const taskFile = path.join(TASK_DIR, 'queue', `${taskId}.json`);
        await fs.mkdir(path.dirname(taskFile), { recursive: true });
        await fs.writeFile(taskFile, JSON.stringify(task, null, 2));

        res.status(202).json({
          task_id: taskId,
          status: 'pending',
          message: 'Task queued successfully',
          check_status_url: `/api/tasks/${taskId}`
        });
      } catch (error) {
        console.error('Error queuing task:', error);
        res.status(500).json({ error: 'Failed to queue task' });
      }
    });

    // Get task status
    app.get('/api/tasks/:taskId', async (req, res) => {
      try {
        const { taskId } = req.params;
        
        // Check all task directories
        const dirs = ['queue', 'running', 'completed', 'failed'];
        let task = null;
        
        for (const dir of dirs) {
          const taskFile = path.join(TASK_DIR, dir, `${taskId}.json`);
          try {
            const content = await fs.readFile(taskFile, 'utf8');
            task = JSON.parse(content);
            break;
          } catch (err) {
            // File doesn't exist in this dir, continue
          }
        }

        if (!task) {
          return res.status(404).json({ error: 'Task not found' });
        }

        res.json(task);
      } catch (error) {
        console.error('Error getting task:', error);
        res.status(500).json({ error: 'Failed to get task status' });
      }
    });

    // List all tasks
    app.get('/api/tasks', async (req, res) => {
      try {
        const dirs = ['queue', 'running', 'completed', 'failed'];
        const tasks = [];
        
        for (const dir of dirs) {
          const dirPath = path.join(TASK_DIR, dir);
          try {
            const files = await fs.readdir(dirPath);
            for (const file of files) {
              if (file.endsWith('.json')) {
                const content = await fs.readFile(path.join(dirPath, file), 'utf8');
                const task = JSON.parse(content);
                tasks.push({
                  id: task.id,
                  status: task.status,
                  created_at: task.created_at,
                  start_time: task.start_time,
                  end_time: task.end_time
                });
              }
            }
          } catch (err) {
            // Directory doesn't exist
          }
        }

        // Sort by created_at desc
        tasks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        
        res.json({ tasks, count: tasks.length });
      } catch (error) {
        console.error('Error listing tasks:', error);
        res.status(500).json({ error: 'Failed to list tasks' });
      }
    });

    // Execute immediate command (for short tasks)
    app.post('/api/execute', async (req, res) => {
      try {
        const { command, cwd = '/workspace', timeout = 300 } = req.body;
        
        if (!command) {
          return res.status(400).json({ error: 'Command is required' });
        }

        console.log(`Executing: ${command}`);
        
        const { stdout, stderr, error } = await execAsync(command, {
          cwd,
          timeout: timeout * 1000,
          maxBuffer: 10 * 1024 * 1024  // 10MB
        }).catch(err => ({ error: err, stdout: '', stderr: '' }));

        if (error) {
          return res.status(500).json({
            error: error.message,
            stdout,
            stderr,
            exit_code: error.code || 1
          });
        }

        res.json({
          stdout,
          stderr,
          exit_code: 0
        });
      } catch (error) {
        console.error('Error executing command:', error);
        res.status(500).json({ error: 'Failed to execute command' });
      }
    });

    // Get system status
    app.get('/api/status', async (req, res) => {
      try {
        const dirs = ['queue', 'running', 'completed', 'failed'];
        const counts = {};
        
        for (const dir of dirs) {
          const dirPath = path.join(TASK_DIR, dir);
          try {
            const files = await fs.readdir(dirPath);
            counts[dir] = files.filter(f => f.endsWith('.json')).length;
          } catch (err) {
            counts[dir] = 0;
          }
        }

        res.json({
          tasks: counts,
          uptime: process.uptime(),
          timestamp: new Date().toISOString()
        });
      } catch (error) {
        console.error('Error getting status:', error);
        res.status(500).json({ error: 'Failed to get status' });
      }
    });

    // Error handling
    app.use((err, req, res, next) => {
      console.error('Unhandled error:', err);
      res.status(500).json({ error: 'Internal server error' });
    });

    app.listen(PORT, () => {
      console.log(`🚀 OpenCode API Gateway listening on port ${PORT}`);
      console.log(`📁 Task directory: ${TASK_DIR}`);
    });
  package.json: |
    {
      "name": "opencode-api-gateway",
      "version": "1.0.0",
      "dependencies": {
        "express": "^4.18.2"
      }
    }
  Dockerfile.api: |
    FROM node:24-alpine
    WORKDIR /app
    COPY package*.json ./
    RUN npm install
    COPY . .
    EXPOSE 3000
    CMD ["node", "api-server.js"]
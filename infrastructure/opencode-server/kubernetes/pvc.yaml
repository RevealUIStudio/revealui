apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-workspace
  namespace: opencode
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard  # Change to your storage class
  
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-config
  namespace: opencode
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---
# Optional: Long-running task queue PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-tasks
  namespace: opencode
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
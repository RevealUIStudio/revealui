apiVersion: v1
kind: Namespace
metadata:
  name: opencode
  labels:
    name: opencode
    app.kubernetes.io/name: opencode
    app.kubernetes.io/component: namespace

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opencode-server
  namespace: opencode
  labels:
    app: opencode-server

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opencode-server
  namespace: opencode
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opencode-server
  namespace: opencode
subjects:
- kind: ServiceAccount
  name: opencode-server
  namespace: opencode
roleRef:
  kind: Role
  name: opencode-server
  apiGroup: rbac.authorization.k8s.io
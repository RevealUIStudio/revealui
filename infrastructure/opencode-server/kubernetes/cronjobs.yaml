apiVersion: batch/v1
kind: CronJob
metadata:
  name: opencode-health-check
  namespace: opencode
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: health-check
            image: opencode-server:latest
            command:
            - sh
            - -c
            - |
              if ! pgrep -f "opencode" > /dev/null; then
                echo "OpenCode process not found, restarting..."
                exit 1
              fi
              echo "OpenCode is running healthy"
          restartPolicy: OnFailure

---
# Long-running task queue processor
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-task-worker
  namespace: opencode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencode-task-worker
  template:
    metadata:
      labels:
        app: opencode-task-worker
    spec:
      containers:
      - name: task-worker
        image: opencode-server:latest
        command: ["/app/scripts/task-worker.sh"]
        envFrom:
        - configMapRef:
            name: opencode-config
        - secretRef:
            name: opencode-secrets
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: tasks
          mountPath: /tasks
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: opencode-workspace
      - name: tasks
        persistentVolumeClaim:
          claimName: opencode-tasks
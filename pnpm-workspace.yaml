packages:
  - "apps/*"
  - "packages/*"

# Centralized version catalog for consistent dependency versions
# Usage: Use "catalog:" prefix in package.json dependencies
# Example: "next": "catalog:" will use the version defined below
catalog:
  # Framework - Next.js & React
  next: ^16.1.6
  react: ^19.2.3
  react-dom: ^19.2.3

  # TypeScript & Build Tools
  typescript: ^5.9.3
  tsx: ^4.21.0
  tsup: ^8.5.1
  vite: ^7.3.1
  vitest: ^4.0.18

  # Database & ORM
  drizzle-orm: ^0.45.1
  drizzle-zod: ^0.8.0
  '@neondatabase/serverless': ^1.0.2
  pg: ^8.18.0
  postgres: ^3.5.4

  # Validation & Schema
  zod: ^4.3.5
  '@types/node': ^25.2.0
  '@types/react': ^19.2.10
  '@types/react-dom': ^19.2.3

  # Linting & Formatting
  '@biomejs/biome': ^2.3.13
  eslint: ^9.39.2
  '@typescript-eslint/eslint-plugin': ^8.54.0
  '@typescript-eslint/parser': ^8.54.0

  # Testing
  '@playwright/test': ^1.58.1
  '@vitest/coverage-v8': ^4.0.18
  '@vitest/ui': ^4.0.18
  jsdom: ^27.4.0

  # Styling
  tailwindcss: ^4.1.18
  '@tailwindcss/postcss': ^4.1.18

  # Utilities
  dotenv: ^17.2.3
  concurrently: ^9.2.1
  bcryptjs: ^3.0.3
  globals: ^15.11.0

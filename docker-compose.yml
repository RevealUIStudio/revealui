# =============================================================================
# RevealUI Docker Compose — Self-Hosting
# =============================================================================
#
# Quick start:
#   1. Copy .env.production.example → .env
#   2. Fill in required values (database URLs, Stripe keys, secrets)
#   3. docker compose up -d
#
# Apps:
#   - api:       Hono REST API (port 3004)
#   - admin:     Next.js Admin Dashboard (port 4000)
#   - marketing: Next.js Marketing Site (port 3000)
#
# Infrastructure:
#   - postgres:  Local PostgreSQL (alternative to NeonDB for self-hosting)
#   - nginx:     Reverse proxy with HTTPS termination
#
# Databases (NeonDB, Supabase) default to external managed services.
# For fully self-hosted setups, use the included PostgreSQL container.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (self-hosted alternative to NeonDB)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: revealui-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revealui}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revealui
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — Hono REST API (OpenAPI + Swagger at /docs)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: revealui-api
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: "3004"
      # Use local postgres if not using external NeonDB
      # POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-revealui}
    ports:
      - "${API_PORT:-3004}:3004"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - revealui
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Admin — Next.js Admin Dashboard (standalone output)
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: revealui-admin
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${CMS_PORT:-4000}:4000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - revealui
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Marketing — Next.js Marketing + Waitlist (standalone output)
  # ---------------------------------------------------------------------------
  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
    container_name: revealui-marketing
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${MARKETING_PORT:-3000}:3000"
    networks:
      - revealui
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (optional — for HTTPS termination)
  # ---------------------------------------------------------------------------
  # Uncomment if self-hosting behind nginx. Requires:
  #   - infrastructure/docker/nginx/nginx.conf
  #   - infrastructure/docker/nginx/conf.d/
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: revealui-nginx
  #   volumes:
  #     - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./infrastructure/docker/nginx/conf.d:/etc/nginx/conf.d:ro
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   depends_on:
  #     - api
  #     - admin
  #     - marketing
  #   networks:
  #     - revealui
  #   restart: unless-stopped

networks:
  revealui:
    driver: bridge

volumes:
  postgres-data:
    driver: local

# RevealUI Kitty Terminal Configuration
#
# Usage: Copy to ~/.config/kitty/kitty.conf
#   or include with: include path/to/kitty-revealui.conf

# Font: JetBrains Mono with fallbacks
font_family      JetBrains Mono Regular
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        14.0

# If JetBrains Mono is unavailable, Kitty falls back to these
symbol_map U+E000-U+F8FF Fira Code

# Cursor: violet-600
cursor            #7C3AED
cursor_text_color #0A0A0F
cursor_shape      block
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
background_opacity   0.96
confirm_os_window_close 0

# Color scheme: RevealUI brand
# Purple accent on near-black background, Tailwind CSS zinc palette

# Primary
foreground #E4E4E7
background #0A0A0F

# Selection
selection_foreground #E4E4E7
selection_background #3F3F46

# Normal ANSI colors
color0  #18181B
color1  #EF4444
color2  #22C55E
color3  #EAB308
color4  #3B82F6
color5  #A855F7
color6  #06B6D4
color7  #E4E4E7

# Bright ANSI colors
color8  #3F3F46
color9  #F87171
color10 #4ADE80
color11 #FACC15
color12 #60A5FA
color13 #C084FC
color14 #22D3EE
color15 #FAFAFA

# Tab bar (matches brand)
active_tab_foreground   #FAFAFA
active_tab_background   #7C3AED
inactive_tab_foreground #E4E4E7
inactive_tab_background #18181B
tab_bar_background      #0A0A0F

# URL color
url_color #7C3AED

# Bell
enable_audio_bell no
visual_bell_color #3F3F46

# Title
wayland_titlebar_color #0A0A0F
macos_titlebar_color   #0A0A0F

name: CI/CD Pipeline

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

# Cancel in-progress runs for the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-config:
    name: Validate Config Module
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check .env.template exists
        run: |
          if [ ! -f .env.template ]; then
            echo "❌ .env.template file is missing!"
            exit 1
          fi
          echo "✅ .env.template found"

      - name: Type check config module
        run: |
          pnpm --filter @revealui/config typecheck

      - name: Test config module can be imported and validated
        env:
          NODE_ENV: test
          REVEALUI_SECRET: test-secret-that-is-at-least-32-characters-long
          REVEALUI_PUBLIC_SERVER_URL: http://localhost:4000
          NEXT_PUBLIC_SERVER_URL: http://localhost:4000
          POSTGRES_URL: postgresql://test:test@localhost:5432/test
          BLOB_READ_WRITE_TOKEN: test-blob-token
          STRIPE_SECRET_KEY: sk_test_test123456789
          STRIPE_WEBHOOK_SECRET: whsec_test123456789
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_test123456789
        run: |
          # Test that config module can be imported and accessed
          node --import tsx -e "
            import config from './packages/config/src/index.ts';
            console.log('✅ Config module imported successfully');
            console.log('✅ Database URL:', config.database.url ? 'present' : 'missing');
            console.log('✅ Stripe key:', config.stripe.secretKey ? 'present' : 'missing');
          "

      - name: Test config validation fails with missing required vars
        env:
          NODE_ENV: test
        run: |
          # Test that validation fails when required vars are missing
          node --import tsx -e "
            import { getConfig } from './packages/config/src/index.ts';
            try {
              const config = getConfig();
              console.error('❌ Config should have failed validation with missing vars');
              process.exit(1);
            } catch (error) {
              console.log('✅ Config correctly fails validation with missing vars');
              console.log('Error:', error.message.substring(0, 100));
            }
          "

      - name: Test config works in build context
        env:
          NODE_ENV: production
          NEXT_PHASE: phase-production-build
          SKIP_ENV_VALIDATION: true
        run: |
          # Test that config allows builds without full validation
          node --import tsx -e "
            import config from './packages/config/src/index.ts';
            console.log('✅ Config allows build-time access');
            console.log('Database URL:', config.database.url || 'empty (expected in build)');
          "

      - name: Test CMS app can use config (type check)
        env:
          NODE_ENV: test
          REVEALUI_SECRET: test-secret-that-is-at-least-32-characters-long
          REVEALUI_PUBLIC_SERVER_URL: http://localhost:4000
          NEXT_PUBLIC_SERVER_URL: http://localhost:4000
          POSTGRES_URL: postgresql://test:test@localhost:5432/test
          BLOB_READ_WRITE_TOKEN: test-blob-token
          STRIPE_SECRET_KEY: sk_test_test123456789
          STRIPE_WEBHOOK_SECRET: whsec_test123456789
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_test123456789
        run: |
          # Type check that config is accessible in CMS app
          cd apps/cms && pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome lint
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: pnpm typecheck:all

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./apps/cms/coverage/lcov.info,./packages/test/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN || '' }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/cms/coverage
            packages/test/coverage
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for high/critical vulnerabilities
        run: |
          AUDIT_RESULT=$(pnpm audit --audit-level=high --json 2>/dev/null || echo '{}')
          echo "$AUDIT_RESULT"
          
          # Extract vulnerability counts (if audit returns valid JSON)
          HIGH=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
          CRITICAL=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")
          
          echo "High vulnerabilities: $HIGH"
          echo "Critical vulnerabilities: $CRITICAL"
          
          # Fail if critical vulnerabilities found
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi

  docs-verification:
    name: Verify Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify documentation links
        run: pnpm docs:verify:links
        continue-on-error: true

      - name: Verify documentation versions
        run: pnpm docs:verify:versions
        continue-on-error: true

      - name: Verify documentation commands
        run: pnpm docs:verify:commands
        continue-on-error: true

      - name: Verify documentation paths
        run: pnpm docs:verify:paths
        continue-on-error: true

      - name: Upload verification reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-verification-reports
          path: |
            docs/*VERIFICATION-REPORT.md
            docs/*VERIFICATION-REPORT.md
          retention-days: 7

  build-cms:
    name: Build CMS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, validate-config]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Restore pnpm dependencies cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Restore Turbo cache
        uses: actions/cache@v4
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Restore package build cache
        uses: actions/cache@v4
        id: package-build-cache
        with:
          path: |
            packages/*/dist
            packages/*/.turbo
          key: ${{ runner.os }}-packages-${{ hashFiles('packages/*/src/**/*.ts', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Restore Next.js cache
        uses: actions/cache@v4
        id: nextjs-cache
        with:
          path: |
            apps/cms/.next/cache
          key: ${{ runner.os }}-nextjs-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build CMS
        run: pnpm --filter cms build
        env:
          NODE_ENV: production
          SKIP_ENV_VALIDATION: true

      - name: Save Turbo cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}

      - name: Save package build cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/.turbo
          key: ${{ runner.os }}-packages-${{ hashFiles('packages/*/src/**/*.ts', 'packages/*/package.json') }}

      - name: Save Next.js cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            apps/cms/.next/cache
          key: ${{ runner.os }}-nextjs-${{ github.sha }}

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, validate-config]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Restore pnpm dependencies cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Restore Turbo cache
        uses: actions/cache@v4
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Restore package build cache
        uses: actions/cache@v4
        id: package-build-cache
        with:
          path: |
            packages/*/dist
            packages/*/.turbo
          key: ${{ runner.os }}-packages-${{ hashFiles('packages/*/src/**/*.ts', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Restore Vite cache
        uses: actions/cache@v4
        id: vite-cache
        with:
          path: |
            apps/mainframe/node_modules/.vite
            apps/mainframe/dist
          key: ${{ runner.os }}-vite-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Build Web
        run: pnpm --filter mainframe build
        env:
          NODE_ENV: production
          SKIP_ENV_VALIDATION: true

      - name: Save Turbo cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}

      - name: Save package build cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/.turbo
          key: ${{ runner.os }}-packages-${{ hashFiles('packages/*/src/**/*.ts', 'packages/*/package.json') }}

      - name: Save Vite cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            apps/mainframe/node_modules/.vite
            apps/mainframe/dist
          key: ${{ runner.os }}-vite-${{ github.sha }}

  validate-crdt:
    name: Validate CRDT Fixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_revealui
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
        run: |
          cd packages/db
          pnpm db:push

      - name: Verify migration
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
        run: |
          psql "$POSTGRES_URL" -c "SELECT COUNT(*) FROM node_id_mappings;" || echo "⚠️  psql not available"
          psql "$POSTGRES_URL" -c "SELECT column_name FROM information_schema.columns WHERE table_name = 'agent_memories' AND column_name = 'embedding_metadata';" || echo "⚠️  psql not available"

      - name: Run integration tests
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
          NODE_ENV: test
        run: |
          pnpm --filter @revealui/memory test __tests__/integration/automated-validation.test.ts || echo "⚠️  Integration tests skipped"

      - name: Run performance tests
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
        run: |
          node scripts/measure-performance.js || echo "⚠️  Performance tests skipped"

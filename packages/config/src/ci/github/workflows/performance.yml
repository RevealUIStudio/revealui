name: Performance Testing

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main, test]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of performance test to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lighthouse-only
          - load-test-only
          - staging-only

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'lighthouse-only'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Build CMS
        run: pnpm --filter cms build
        env:
          NODE_ENV: production
          SKIP_ENV_VALIDATION: true

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4000
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json

      - name: Analyze bundle size
        run: |
          echo "Bundle size analysis:"
          du -sh apps/cms/.next/static/chunks/* | sort -h | tail -10

      - name: Check bundle size budget
        run: |
          # Check if bundle size exceeds budget
          MAX_BUNDLE_SIZE_MB=5
          BUNDLE_SIZE=$(du -sm apps/cms/.next | cut -f1)
          if [ "$BUNDLE_SIZE" -gt "$MAX_BUNDLE_SIZE_MB" ]; then
            echo "❌ Bundle size ($BUNDLE_SIZE MB) exceeds budget ($MAX_BUNDLE_SIZE_MB MB)"
            exit 1
          else
            echo "✅ Bundle size ($BUNDLE_SIZE MB) within budget ($MAX_BUNDLE_SIZE_MB MB)"
          fi

  load-tests:
    name: Load Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'load-test-only'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Autocannon is installed via package.json dependencies

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start test server
        run: |
          pnpm dev &
          sleep 10
        env:
          POSTGRES_URL: ${{ secrets.TEST_POSTGRES_URL }}

      - name: Run load performance tests
        run: |
          pnpm test:performance
        env:
          BASE_URL: http://localhost:4000

      - name: Compare with baseline
        run: |
          pnpm tsx scripts/test/performance-regression.ts

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            packages/test/load-tests/**/*.json
            packages/test/load-tests/baseline.json
          retention-days: 30

  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'staging-only')
    environment: staging
    timeout-minutes: 15
    outputs:
      staging-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Build applications
        run: |
          pnpm --filter cms build
          pnpm --filter web build
        env:
          NODE_ENV: production
          SKIP_ENV_VALIDATION: true

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel staging
        id: deploy
        run: |
          echo "Deploying to Vercel staging..."

          # Deploy with staging alias
          DEPLOYMENT_URL=$(vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -o 'https://[^ ]*\.vercel\.app')

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Failed to extract deployment URL from Vercel output"
            exit 1
          fi

          echo "Deployment URL: $DEPLOYMENT_URL"
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

          # Set staging URL for performance tests
          echo "STAGING_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for staging deployment to be ready..."
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"

          # Health check with timeout
          for i in {1..30}; do
            if curl -s -f "$DEPLOY_URL/api/health" > /dev/null 2>&1 || curl -s -f "$DEPLOY_URL" > /dev/null 2>&1; then
              echo "✅ Staging deployment is ready at $DEPLOY_URL"
              break
            fi
            echo "Waiting for staging deployment... ($i/30)"
            sleep 10
          done

          # Final health check
          if curl -s -f "$DEPLOY_URL/api/health" > /dev/null 2>&1 || curl -s -f "$DEPLOY_URL" > /dev/null 2>&1; then
            echo "✅ Staging deployment confirmed healthy"
          else
            echo "⚠️ Could not verify staging health, proceeding anyway"
          fi

  staging-performance:
    name: Staging Performance Tests
    runs-on: ubuntu-latest
    needs: staging-deploy
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'staging-only')
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run performance tests against staging
        run: |
          echo "Running performance tests against staging: ${{ needs.staging-deploy.outputs.staging-url }}"
          pnpm test:performance
        env:
          BASE_URL: ${{ needs.staging-deploy.outputs.staging-url }}

      - name: Compare staging performance against production baseline
        run: |
          pnpm tsx scripts/test/performance-regression.ts
        env:
          PERFORMANCE_ENV: staging

      - name: Upload staging performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-performance-results
          path: |
            packages/test/load-tests/**/*.json
            packages/test/load-tests/baseline.json
          retention-days: 30

      - name: Performance validation
        run: |
          # Check if performance meets minimum requirements
          echo "📊 Validating staging performance metrics..."

          # This could be enhanced to check actual performance thresholds
          echo "✅ Staging performance tests completed"
          echo "📈 Performance results uploaded as artifacts"

  production-deploy-gate:
    name: Production Deploy Gate
    runs-on: ubuntu-latest
    needs: [staging-deploy, staging-performance]
    environment: production
    if: success() && (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Production Deployment Readiness Check
        run: |
          echo "✅ Staging deployment completed successfully"
          echo "✅ Staging performance tests passed"
          echo ""
          echo "📊 Staging Environment Details:"
          echo "   URL: ${{ needs.staging-deploy.outputs.staging-url }}"
          echo "   Build: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref }}"
          echo ""
          echo "🚀 Ready for production deployment"
          echo ""
          echo "Next Steps:"
          echo "1. 🔍 Review staging deployment manually"
          echo "2. 📊 Verify performance metrics in artifacts"
          echo "3. 🚀 Trigger production deployment workflow"
          echo ""
          echo "💡 Tip: Use the 'Production Deployment' workflow to deploy to production"

      - name: Create production deployment instructions
        run: |
          echo "## 🚀 Production Deployment Ready

          **Staging Environment:** ${{ needs.staging-deploy.outputs.staging-url }}
          **Build:** \`${{ github.sha }}\`
          **Performance Tests:** ✅ Passed

          ### To Deploy to Production:

          1. **Review Staging**: Visit ${{ needs.staging-deploy.outputs.staging-url }} and verify functionality
          2. **Check Metrics**: Download performance test artifacts from this workflow run
          3. **Deploy**: Go to Actions → Production Deployment workflow → Run workflow
          4. **Input**: \`staging_url: ${{ needs.staging-deploy.outputs.staging-url }}\`

          ### Rollback Plan:
          - Vercel deployments can be rolled back via dashboard
          - Previous working deployment will be preserved
          - No data loss on rollback

          **Status:** Awaiting manual approval for production deployment" >> $GITHUB_STEP_SUMMARY
feature: admin-engine
name: Admin Engine (Collections + REST)
status: beta
tier: free
last-verified: 2026-03-11

description: >
  Custom runtime engine with 20 collections, per-collection RBAC, lifecycle hooks,
  Lexical rich text, and auto-generated REST API. Built on @revealui/core
  (not a Payload fork, though some patterns are inspired by it).

strategy:
  entitlement-model: "Hosted premium admin capabilities should resolve from account/workspace entitlements first"
  commercial-fit:
    - "content and admin features are primarily platform subscription value"
    - "AI or automation features can layer in metered usage"
    - "per-user or deployment licenses should stay secondary and explicit"

api-surface:
  collections:
    endpoint: "20 collection definitions in apps/admin/src/lib/collections/"
    openapi: true
    tested: true
  rest-api:
    endpoint: "@revealui/core — createRESTHandlers auto-generates CRUD routes"
    openapi: true
    tested: true
    routes:
      - "GET /api/collections/:collection — find (paginated)"
      - "GET /api/collections/:collection/:id — findByID"
      - "POST /api/collections/:collection — create"
      - "PATCH /api/collections/:collection/:id — update"
      - "DELETE /api/collections/:collection/:id — delete"
    query-params: "depth, locale, where (JSON), limit, page, sort, select, populate, draft"
  access-control:
    endpoint: "Per-collection RBAC with role-based read/write/delete"
    openapi: false
    tested: true
    functions:
      - "isAdmin, isSuperAdmin — global admin checks"
      - "authenticated — any logged-in user"
      - "authenticatedOrPublished — published content OR authenticated"
      - "isAdminAndTenant — tenant-scoped admin"
      - "hasRole() — role-based checks"
      - "checkUserPurchases — paywall-protected content"
    return-types: "true | false | Drizzle where clause (record-level filtering)"
  hooks:
    endpoint: "beforeChange/afterChange/afterRead hooks on all collections"
    openapi: false
    tested: true
    patterns:
      - "Products/Prices: Stripe validation, cache-backed API calls, revalidation"
      - "Posts/Pages: publishedAt population, cache revalidation, search indexing"
      - "Orders: clearUserCart after checkout"
    signature: "({ doc, req, operation, previousDoc, context }) => Promise<doc | undefined>"
  rich-text:
    endpoint: "Lexical rich text editor via @revealui/core/richtext"
    openapi: false
    tested: true
    features:
      - "HeadingFeature (h1-h4)"
      - "BlocksFeature (Banner, Code, MediaBlock)"
      - "FixedToolbarFeature, InlineToolbarFeature"
      - "HorizontalRuleFeature"
  core-engine:
    endpoint: "@revealui/core — runtime engine exports"
    openapi: false
    tested: true
    exports:
      - "createRevealUIInstance, buildConfig, getRevealUI"
      - "createRevealUICollection, createRevealUIField, createRevealUIBlock"
      - "universalPostgresAdapter"
      - "isLicensed, isFeatureEnabled, getCurrentTier"
      - "Logger, createLogger, defaultLogger"

collections:
  content:
    - "Posts — blog content, Lexical rich text, author, versioning (max 50 drafts), categories, SEO"
    - "Pages — page builder with hero + blocks (CTA, Content, Media, Archive, Form, Code, Banner)"
    - "Categories — taxonomy for posts and products"
    - "Tags — lightweight tagging"
    - "Media — file/image management"
    - "Contents — generic content blocks"
    - "Layouts — reusable layout configurations"
    - "Heros — hero section definitions"
    - "Banners — alert/banner blocks"
    - "Cards — card component definitions"
    - "Info — information blocks"
    - "Videos — video content"
  commerce:
    - "Products — Stripe-backed with paywall, hooks, archive blocks, draft versioning"
    - "Prices — Stripe price tiers, calculated fields, purchase access control"
    - "Orders — user relationship, cart clearing on create, access (admin or owner)"
    - "Subscriptions — subscription management"
  system:
    - "Users — auth, roles (super-admin, admin, tenant-super-admin, tenant-admin), multi-tenant"
    - "Tenants — multi-tenant configuration"
    - "Conversations — AI conversation history"
    - "Events — event logging"

field-types:
  basic: "text, textarea, number, email, password, code, date, checkbox"
  selection: "select (hasMany), radio"
  relationship: "relationship (relationTo, hasMany), upload"
  structural: "array, blocks, group, row, collapsible, tabs"
  special: "richText (Lexical), json, point (GeoJSON), ui (no storage)"
  field-options: "name, type, required, unique, index, admin, access, hooks, validate, localized, maxDepth"

user-roles:
  - "super-admin — global full access"
  - "admin — site-level full access"
  - "tenant-super-admin — tenant-scoped full access"
  - "tenant-admin — tenant-scoped admin"

ui-surface:
  document-form:
    location: "apps/admin/src/components/DocumentForm.tsx"
    status: basic

limitations:
  - id: field-renderers
    surface: ui
    summary: "Not all field types render correct controls (blocks, relationships, uploads, arrays incomplete)"
  - id: version-history-ui
    surface: ui
    summary: "Page revisions stored in DB but no UI to view/restore them"
  - id: no-collection-list-ui
    surface: ui
    summary: "No collection list views with pagination in admin dashboard"
  - id: commercial-model-mix
    surface: api
    summary: "Commerce and paywall concepts exist in the runtime engine, but hosted entitlement resolution still needs to fully align around account-level billing"

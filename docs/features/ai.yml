feature: ai
name: AI Agents & Memory
status: beta
tier: pro
last-verified: 2026-03-11

api-surface:
  agent-tasks:
    endpoint: "POST /api/agent-tasks/* (gated by isFeatureEnabled('ai'))"
    openapi: true
    tested: true
  agent-stream:
    endpoint: "POST /api/agent-stream (SSE, gated by 'ai')"
    openapi: true
    tested: true
  rag-index:
    endpoint: "GET|POST|DELETE /api/rag-index (admin writes, gated by 'ai')"
    openapi: true
    tested: true
  ai-package:
    endpoint: "@revealui/ai — 18 import subpaths"
    openapi: false
    tested: true
    notes: "CRDT memory, open-model LLM providers (inference snaps, Ollama), agent orchestration"

package-notes:
  subpaths: 18
  path-alias: "Does NOT use ~/  — do NOT add to tsconfig.json paths"
  admin-import: "Use ^0.0.2 not workspace:* (Pro, not in workspace)"
  bundling: "noExternal: [/^@revealui\\/(?!ai($|\\/))/] — excluded from tsup bundling"

limitations:
  - id: dist-only
    surface: api
    summary: "@revealui/ai is dist-only in public repo — source in private revealui-jv"
  - id: llm-providers
    surface: api
    summary: "Open models only — inference snaps (local, recommended), Ollama (local, fallback), cloud via self-hosted harness (Pro+). No proprietary providers."
  - id: license-required
    surface: api
    summary: "Requires Pro tier — currently gated by legacy feature checks that should converge on account-level entitlements"
  - id: metering-model
    surface: api
    summary: "Long-term commercial model should bill AI features via metered agent execution, not only static tier flags"

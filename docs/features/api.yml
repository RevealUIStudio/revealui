feature: api
name: REST API (Hono + OpenAPI)
status: production
tier: free
last-verified: 2026-03-11

api-surface:
  health:
    endpoint: "GET /health, /health/live, /health/ready, /health/metrics"
    openapi: true
    tested: true
  content-posts:
    endpoint: "GET|POST /posts, GET|PATCH|DELETE /posts/:id"
    openapi: true
    input-validation: zod
    tested: true
  content-pages:
    endpoint: "GET|POST /sites/:siteId/pages, GET|PATCH|DELETE /pages/:id"
    openapi: true
    input-validation: zod
    tested: true
  content-media:
    endpoint: "GET|PATCH|DELETE /media/:id"
    openapi: true
    tested: true
  content-sites:
    endpoint: "GET|POST|PATCH|DELETE /sites/:id"
    openapi: true
    input-validation: zod
    tested: true
  tickets:
    endpoint: "GET|POST /tickets, GET|PATCH|DELETE /tickets/:id"
    openapi: true
    input-validation: zod
    tested: true
  pricing:
    endpoint: "GET /api/pricing"
    openapi: true
    tested: true
  gdpr:
    endpoint: "POST /api/gdpr/consent, POST /api/gdpr/delete, POST /api/gdpr/anonymize"
    openapi: true
    input-validation: zod
    tested: true
  errors:
    endpoint: "POST /api/errors"
    openapi: true
    tested: true
  logs:
    endpoint: "POST /api/logs"
    openapi: true
    tested: true
  api-keys:
    endpoint: "GET|POST|DELETE /api/api-keys"
    openapi: true
    tested: true
  marketplace:
    endpoint: "POST /api/marketplace/publish, /invoke, /connect"
    openapi: true
    tested: true
  rag-index:
    endpoint: "GET|POST|DELETE /api/rag-index"
    openapi: true
    tested: true
  agent-tasks:
    endpoint: "POST /api/agent-tasks/*"
    openapi: true
    tested: true
  agent-stream:
    endpoint: "POST /api/agent-stream"
    openapi: true
    tested: true
  collab:
    endpoint: "POST /api/collab/update, GET /api/collab/snapshot/:documentId"
    openapi: true
    input-validation: zod
    tested: true
  agent-collab:
    endpoint: "POST /api/collab/agent/connect, POST /api/collab/agent/edit, GET /api/collab/agent/snapshot/:documentId"
    openapi: true
    input-validation: zod
    tested: true
  code-provenance:
    endpoint: "GET|POST /api/code-provenance"
    openapi: true
    tested: true
  terminal-auth:
    endpoint: "POST /api/terminal-auth"
    openapi: true
    tested: true
  a2a:
    endpoint: "GET /.well-known/a2a"
    openapi: true
    tested: true

ui-surface:
  swagger-docs:
    location: "/docs (Swagger UI)"
    status: functional

limitations: []

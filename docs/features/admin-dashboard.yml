feature: admin-admin
name: Admin Dashboard Dashboard
status: alpha
tier: free
last-verified: 2026-03-11

api-surface:
  admin-routes:
    endpoint: "apps/admin/src/app/(backend)/admin/ catch-all router"
    openapi: false
    tested: false

ui-surface:
  agents-page:
    location: "apps/admin/src/app/(backend)/admin/agents/page.tsx"
    status: functional
  settings-page:
    location: "apps/admin/src/app/(backend)/admin/settings/page.tsx"
    status: functional
  api-keys-page:
    location: "apps/admin/src/app/(backend)/admin/settings/api-keys/page.tsx"
    status: functional
  account-page:
    location: "apps/admin/src/app/(backend)/admin/settings/account/page.tsx"
    status: basic
  logs-page:
    location: "apps/admin/src/app/(backend)/admin/logs/page.tsx"
    status: functional
  errors-page:
    location: "apps/admin/src/app/(backend)/admin/errors/page.tsx"
    status: functional
  monitoring-page:
    location: "apps/admin/src/app/(backend)/admin/monitoring/page.tsx"
    status: functional
  chat-page:
    location: "apps/admin/src/app/(backend)/admin/chat/page.tsx"
    status: basic
  upgrade-page:
    location: "apps/admin/src/app/(backend)/admin/upgrade/page.tsx"
    status: functional

limitations:
  - id: no-collection-nav
    surface: ui
    summary: "No collection list views with pagination in admin dashboard"
  - id: no-content-search
    surface: ui
    summary: "No search bar to filter collection documents"
  - id: incomplete-field-renderers
    surface: ui
    summary: "DocumentForm missing renderers for blocks, relationships, uploads, arrays"
  - id: no-form-validation
    surface: ui
    summary: "Form validation errors not displayed inline next to fields"

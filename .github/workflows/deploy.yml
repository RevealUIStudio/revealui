name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version/Tag to deploy'
        required: true
        type: string

  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.revealui.example.com
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build applications
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push CMS image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.cms
          push: true
          tags: |
            revealui/cms:staging
            revealui/cms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.dashboard
          push: true
          tags: |
            revealui/dashboard:staging
            revealui/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl config use-context staging
          kubectl set image deployment/revealui-cms revealui-cms=revealui/cms:${{ github.sha }} -n revealui-staging
          kubectl set image deployment/revealui-dashboard revealui-dashboard=revealui/dashboard:${{ github.sha }} -n revealui-staging
          kubectl rollout status deployment/revealui-cms -n revealui-staging --timeout=10m
          kubectl rollout status deployment/revealui-dashboard -n revealui-staging --timeout=10m

      - name: Run database migrations
        run: |
          kubectl run revealui-migrate-${{ github.sha }} \
            --image=revealui/cms:${{ github.sha }} \
            --restart=Never \
            --env="DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }}" \
            -n revealui-staging \
            -- pnpm db:migrate
          kubectl wait --for=condition=complete --timeout=5m job/revealui-migrate-${{ github.sha }} -n revealui-staging

      - name: Verify deployment
        run: |
          kubectl get pods -n revealui-staging
          kubectl get services -n revealui-staging

      - name: Run smoke tests
        run: |
          curl -f https://staging.revealui.example.com/api/health || exit 1
          curl -f https://dashboard-staging.revealui.example.com/api/health || exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Staging Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment ${{ job.status }}*\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}"
                  }
                }
              ]
            }

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://revealui.example.com
    timeout-minutes: 45
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Verify version tag
        run: |
          git fetch --tags
          git tag --list | grep -q "^${{ github.event.inputs.version }}$" || (echo "Tag does not exist" && exit 1)

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build applications
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push CMS image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.cms
          push: true
          tags: |
            revealui/cms:latest
            revealui/cms:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.dashboard
          push: true
          tags: |
            revealui/dashboard:latest
            revealui/dashboard:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes (Blue-Green)
        run: |
          kubectl config use-context production

          # Deploy green (new version)
          kubectl apply -f k8s/deployments/cms.yaml -n revealui
          kubectl apply -f k8s/deployments/dashboard.yaml -n revealui

          kubectl set image deployment/revealui-cms revealui-cms=revealui/cms:${{ github.event.inputs.version }} -n revealui
          kubectl set image deployment/revealui-dashboard revealui-dashboard=revealui/dashboard:${{ github.event.inputs.version }} -n revealui

          kubectl rollout status deployment/revealui-cms -n revealui --timeout=15m
          kubectl rollout status deployment/revealui-dashboard -n revealui --timeout=15m

      - name: Run database migrations
        run: |
          kubectl run revealui-migrate-${{ github.event.inputs.version }} \
            --image=revealui/cms:${{ github.event.inputs.version }} \
            --restart=Never \
            --env="DATABASE_URL=${{ secrets.DATABASE_URL_PRODUCTION }}" \
            -n revealui \
            -- pnpm db:migrate
          kubectl wait --for=condition=complete --timeout=10m job/revealui-migrate-${{ github.event.inputs.version }} -n revealui

      - name: Verify deployment
        run: |
          kubectl get pods -n revealui
          kubectl get services -n revealui
          kubectl top pods -n revealui

      - name: Run smoke tests
        run: |
          curl -f https://revealui.example.com/api/health || exit 1
          curl -f https://dashboard.revealui.example.com/api/health || exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Production Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment ${{ job.status }}*\nVersion: ${{ github.event.inputs.version }}\nActor: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false

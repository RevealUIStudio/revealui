name: Deploy

# Production-only deployment. Vercel Git Integration is DISABLED.
#
# Trigger: push to main (merge from test) or manual dispatch.
# Only affected apps are deployed — if a shared package changes, all apps deploy.
#
# Pre-deploy validation: migration drift check only (no full typecheck —
# CI already validated before merge via branch protection).
#
# Branch pipeline:
#   feature/* → PR → test (CI only, no deploy)
#   test → PR → main (full CI required, deploy on merge)
#   Manual test preview: deploy-test.yml (workflow_dispatch)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apps:
        description: "Apps to deploy (comma-separated, or 'all' to force all)"
        required: false
        type: string
        default: auto

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || secrets.VERCEL_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || 'revealuistudio' }}

jobs:
  # ---------------------------------------------------------------------------
  # Pre-deploy validation — migration drift only (typecheck runs in CI)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for uncommitted migrations
        run: |
          echo "Building DB package (with dependencies) for drizzle-kit schema check..."
          pnpm turbo build --filter=@revealui/db
          DRIZZLE_REQUIRE_URL=false npx drizzle-kit generate --config=packages/db/drizzle.config.ts 2>&1 || true
          DRIFT=$(git diff --name-only -- packages/db/migrations/)
          NEW=$(git ls-files --others --exclude-standard -- packages/db/migrations/)
          if [ -n "$DRIFT" ] || [ -n "$NEW" ]; then
            echo "::error::Schema drift detected — migrations need to be generated and committed"
            echo "Changed: $DRIFT"
            echo "New: $NEW"
            git checkout -- packages/db/migrations/ 2>/dev/null || true
            exit 1
          fi
          echo "No migration drift detected."

  # ---------------------------------------------------------------------------
  # Detect which apps were affected by the merge
  # ---------------------------------------------------------------------------
  detect:
    name: Detect Affected Apps
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has-apps: ${{ steps.detect.outputs.has-apps }}
      sha: ${{ steps.detect.outputs.sha }}
      app-list: ${{ steps.detect.outputs.app-list }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Detect affected apps
        id: detect
        env:
          INPUT_APPS: ${{ inputs.apps }}
        run: |
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

          ALL_APPS="api admin marketing docs revealcoin"

          # Manual override: deploy specific apps or all
          if [ -n "$INPUT_APPS" ] && [ "$INPUT_APPS" != "auto" ]; then
            if [ "$INPUT_APPS" = "all" ]; then
              AFFECTED="$ALL_APPS"
            else
              AFFECTED=$(echo "$INPUT_APPS" | tr ',' ' ')
            fi
            echo "::notice::Manual deploy: $AFFECTED"
          else
            # Auto-detect from git diff
            CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || echo "")

            if [ -z "$CHANGED" ]; then
              echo "::notice::No changes detected — deploying all apps"
              AFFECTED="$ALL_APPS"
            else
              AFFECTED=""

              # Check each app directory for direct changes
              for app in $ALL_APPS; do
                if echo "$CHANGED" | grep -q "^apps/$app/"; then
                  AFFECTED="$AFFECTED $app"
                fi
              done

              # Shared packages changed → deploy all apps
              if echo "$CHANGED" | grep -q "^packages/"; then
                echo "::notice::Shared package changed — deploying all apps"
                AFFECTED="$ALL_APPS"
              fi

              # Root config changed → deploy all apps
              if echo "$CHANGED" | grep -qE "^(package\.json|pnpm-lock\.yaml|turbo\.json|\.env)"; then
                echo "::notice::Root config changed — deploying all apps"
                AFFECTED="$ALL_APPS"
              fi

              # Deduplicate
              AFFECTED=$(echo "$AFFECTED" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
            fi
          fi

          if [ -z "$AFFECTED" ]; then
            echo "::notice::No apps affected — skipping deploy"
            echo "has-apps=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "app-list=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has-apps=true" >> "$GITHUB_OUTPUT"
          echo "app-list=$AFFECTED" >> "$GITHUB_OUTPUT"

          # Build matrix JSON with project IDs
          MATRIX="["
          FIRST=true
          for app in $AFFECTED; do
            case "$app" in
              api)        PID="prj_zk6EQijYXwd9L7BccuBssi436ktM" ;;
              admin)      PID="prj_7sEFDg4MH6C26nJPjrukK86QdwfG" ;;
              marketing)  PID="prj_frTIYlnONVPLNIjKnQpINiGb5lm0" ;;
              docs)       PID="prj_OPwr0FrgcK17AOBCyoj4JIilJ9S1" ;;
              revealcoin) PID="prj_XDiPXngciRytGA8j0vNIDz7hENRM" ;;
              *) echo "::warning::Unknown app: $app"; continue ;;
            esac
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX="$MATRIX,"; fi
            MATRIX="$MATRIX{\"app\":\"$app\",\"project-id\":\"$PID\"}"
          done
          MATRIX="$MATRIX]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying: $AFFECTED"

  # ---------------------------------------------------------------------------
  # Deploy affected apps in parallel
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, detect]
    if: needs.detect.outputs.has-apps == 'true'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.detect.outputs.sha }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stub gitignored Pro packages (directory only — no package.json)
        run: |
          for pkg in ai harnesses; do
            if [ ! -d "packages/$pkg" ]; then
              mkdir -p "packages/$pkg"
            fi
          done

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}

      - name: Validate critical environment variables
        if: matrix.app == 'api' || matrix.app == 'admin'
        run: |
          echo "Checking critical env vars for ${{ matrix.app }}..."
          ENV_OUTPUT=$(vercel env ls production --token="$VERCEL_TOKEN" 2>&1) || {
            echo "::warning::vercel env ls failed — skipping validation"
            echo "$ENV_OUTPUT"
            exit 0
          }
          echo "::debug::vercel env ls output: $ENV_OUTPUT"
          MISSING=0

          # Core vars required by all server apps
          CORE_VARS="POSTGRES_URL REVEALUI_SECRET REVEALUI_PUBLIC_SERVER_URL"

          # API-specific: billing, email, webhooks, cron
          API_VARS="STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET REVEALUI_CRON_SECRET REVEALUI_LICENSE_PRIVATE_KEY REVEALUI_KEK"

          # Email: Gmail service account (primary) or Resend (fallback)
          EMAIL_VARS="GOOGLE_SERVICE_ACCOUNT_EMAIL GOOGLE_PRIVATE_KEY"

          REQUIRED="$CORE_VARS"
          if [ "${{ matrix.app }}" = "api" ]; then
            REQUIRED="$CORE_VARS $API_VARS"
            # Check for at least one email provider
            HAS_GMAIL=false
            HAS_RESEND=false
            if echo "$ENV_OUTPUT" | grep -q "GOOGLE_SERVICE_ACCOUNT_EMAIL" && echo "$ENV_OUTPUT" | grep -q "GOOGLE_PRIVATE_KEY"; then
              HAS_GMAIL=true
            fi
            if echo "$ENV_OUTPUT" | grep -q "RESEND_API_KEY"; then
              HAS_RESEND=true
            fi
            if [ "$HAS_GMAIL" = "false" ] && [ "$HAS_RESEND" = "false" ]; then
              echo "::warning::No email provider configured — emails will be logged, not sent. Set GOOGLE_SERVICE_ACCOUNT_EMAIL + GOOGLE_PRIVATE_KEY when ready."
            fi
          fi

          for VAR in $REQUIRED; do
            if ! echo "$ENV_OUTPUT" | grep -q "$VAR"; then
              echo "::error::Missing required env var: $VAR"
              MISSING=1
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "::error::Deploy blocked — set missing env vars in Vercel project settings"
            exit 1
          fi
          echo "All critical env vars present."
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}

      - name: Skip Vercel internal install (CI already installed)
        run: |
          if [ -f .vercel/project.json ]; then
            jq '.settings.installCommand = ""' .vercel/project.json > .vercel/project.json.tmp
            mv .vercel/project.json.tmp .vercel/project.json
          fi

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}
          SKIP_ENV_VALIDATION: "true"

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::${{ matrix.app }} deployed to $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}

  # ---------------------------------------------------------------------------
  # Post-deploy smoke test
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect, deploy]

    steps:
      - name: Health check — API (readiness probe)
        run: |
          API_URL="${REVEALUI_API_URL:-https://api.revealui.com}"
          echo "Checking $API_URL/health/ready (DB + memory + config)..."
          for i in $(seq 1 12); do
            RESP=$(curl -sf "$API_URL/health/ready" 2>/dev/null || echo "")
            if [ -n "$RESP" ]; then
              echo "API ready: $RESP"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::error::API readiness check failed after 2 minutes"
          exit 1

      - name: Health check — Admin
        run: |
          ADMIN_URL="${REVEALUI_ADMIN_URL:-https://admin.revealui.com}"
          echo "Checking $ADMIN_URL..."
          for i in $(seq 1 12); do
            if curl -sf "$ADMIN_URL" -o /dev/null 2>&1; then
              echo "Admin healthy"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::error::Admin health check failed after 2 minutes"
          exit 1

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [detect, deploy]
    if: always()

    steps:
      - name: Output deployment summary
        env:
          DEPLOY_SHA: ${{ needs.detect.outputs.sha }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          DEPLOY_APPS: ${{ needs.detect.outputs.app-list }}
        run: |
          cat <<EOF
          {
            "environment": "production",
            "sha": "$DEPLOY_SHA",
            "status": "$DEPLOY_STATUS",
            "apps": "$DEPLOY_APPS",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

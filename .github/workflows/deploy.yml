name: Deploy

# Production-only deployment. Vercel Git Integration is DISABLED.
#
# Trigger: push to main (merge from test) or manual dispatch.
# Only affected apps are deployed — if a shared package changes, all apps deploy.
#
# Pre-deploy validation: migration drift check only (no full typecheck —
# CI already validated before merge via branch protection).
#
# Branch pipeline:
#   feature/* → PR → test (CI only, no deploy)
#   test → PR → main (full CI required, deploy on merge)
#   Manual test preview: deploy-test.yml (workflow_dispatch)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apps:
        description: "Apps to deploy (comma-separated, or 'all' to force all)"
        required: false
        type: string
        default: auto

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || secrets.VERCEL_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || 'revealuistudio' }}

jobs:
  # ---------------------------------------------------------------------------
  # Pre-deploy validation — migration drift only (typecheck runs in CI)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for uncommitted migrations
        run: |
          echo "Building DB package (with dependencies) for drizzle-kit schema check..."
          pnpm turbo build --filter=@revealui/db
          DRIZZLE_REQUIRE_URL=false npx drizzle-kit generate --config=packages/db/drizzle.config.ts 2>&1 || true
          DRIFT=$(git diff --name-only -- packages/db/migrations/)
          NEW=$(git ls-files --others --exclude-standard -- packages/db/migrations/)
          if [ -n "$DRIFT" ] || [ -n "$NEW" ]; then
            echo "::error::Schema drift detected — migrations need to be generated and committed"
            echo "Changed: $DRIFT"
            echo "New: $NEW"
            git checkout -- packages/db/migrations/ 2>/dev/null || true
            exit 1
          fi
          echo "No migration drift detected."

      # ── Pre-deploy production env validation (api project) ─────────────
      # Mirrors apps/server/src/lib/validate-startup.ts → validateStartup so
      # presence + format errors fail the gate before deploy starts. The
      # 2026-04-25 #540 incident root-cause was env config that the prior
      # in-deploy bash grep missed: vars unset by name plus malformed
      # values (sk_test_ in live mode, REVEALUI_CRON_SECRET <32 chars,
      # missing REVEALUI_LICENSE_PRIVATE_KEY) — all of which throw in
      # validateStartup at module init but were invisible to a name-only
      # `vercel env ls | grep` check. Closes GAP-125.

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull production env from Vercel (api project)
        run: |
          rm -rf .vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          if [ ! -f .vercel/.env.production.local ]; then
            echo "::error::vercel pull produced no .env.production.local"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_zk6EQijYXwd9L7BccuBssi436ktM # api

      - name: Build @revealui/core (transitive dep of validate-startup)
        # validateStartup imports validateLicenseKey from @revealui/core/license
        # (top-level, used by the Forge-mode validateLicenseAtStartup branch).
        # Build core's dist so the tsx invocation in validate:prod-env can
        # resolve the import. Hosted-mode validation does not call into the
        # license code, but the module-level import still needs to resolve.
        run: pnpm turbo build --filter=@revealui/core

      - name: Validate prod env (presence + format, mirrors validateStartup)
        run: pnpm validate:prod-env

  # ---------------------------------------------------------------------------
  # Apply pending database migrations (additive-only by convention)
  # Runs after validation, before deploy — new schema must exist before new code.
  # ---------------------------------------------------------------------------
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Build DB package
        run: pnpm turbo build --filter=@revealui/db

      - name: Pull POSTGRES_URL from Vercel (API project is DB owner)
        # Single source of truth: Vercel project env. Avoids maintaining
        # POSTGRES_URL as a separate GitHub secret that can drift on rotation.
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          if [ ! -f .vercel/.env.production.local ]; then
            echo "::error::vercel pull produced no .env.production.local"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_zk6EQijYXwd9L7BccuBssi436ktM # api

      - name: Run migrations
        # Runs drizzle-kit migrate (non-interactive, applies pending SQL
        # files from packages/db/migrations/ against the __drizzle_migrations
        # meta table). Do NOT invoke root `pnpm db:migrate` here — that
        # forwards to drizzle-kit migrate via the @revealui/db filter too,
        # but keeping the explicit --filter form makes the CI contract obvious.
        #
        # Output capture: drizzle-kit's TUI spinner uses `\r` to overwrite
        # the previous line, which causes the actual error message to be
        # eaten when the migrator fails (see 2026-04-19 incident — the
        # `duplicate_object` from 0005's unguarded ADD CONSTRAINT was
        # invisible until the spinner output was inspected manually).
        # Forcing NO_COLOR + piping through `tr '\r' '\n'` converts each
        # spinner tick to its own line, leaving the trailing error visible.
        # PIPESTATUS preserves drizzle-kit's exit code through the pipe.
        #
        # GAP-168 defense-in-depth (sandwich the migrate with two guards):
        #   1. db:backfill-migrations BEFORE — detects the 2026-04-20 incident
        #      class (drizzle.__drizzle_migrations rows missing for journal
        #      entries) and fails the deploy with a clear diagnostic before
        #      drizzle-kit re-applies already-applied SQL.
        #   2. db:assert-migration-count AFTER — asserts the post-migrate
        #      tracking row count matches the journal entry count, catching
        #      half-applied state regardless of which side drifted.
        env:
          NO_COLOR: "1"
          FORCE_COLOR: "0"
        run: |
          set -a
          # shellcheck disable=SC1091
          . .vercel/.env.production.local
          set +a
          if [ -z "${POSTGRES_URL:-}" ]; then
            echo "::error::POSTGRES_URL not found in pulled Vercel env"
            exit 1
          fi
          echo "::group::Backfill check (pre-migrate)"
          pnpm db:backfill-migrations
          echo "::endgroup::"
          echo "::group::drizzle-kit migrate"
          pnpm --filter @revealui/db db:migrate 2>&1 | tr '\r' '\n'
          MIGRATE_STATUS=${PIPESTATUS[0]}
          echo "::endgroup::"
          if [ "$MIGRATE_STATUS" -ne 0 ]; then
            echo "::error::drizzle-kit migrate exited $MIGRATE_STATUS"
            exit "$MIGRATE_STATUS"
          fi
          echo "::group::Migration count assertion (post-migrate)"
          pnpm db:assert-migration-count
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Detect which apps were affected by the merge
  # ---------------------------------------------------------------------------
  detect:
    name: Detect Affected Apps
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has-apps: ${{ steps.detect.outputs.has-apps }}
      sha: ${{ steps.detect.outputs.sha }}
      app-list: ${{ steps.detect.outputs.app-list }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Detect affected apps
        id: detect
        env:
          INPUT_APPS: ${{ inputs.apps }}
        run: |
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

          ALL_APPS="api admin marketing docs revealcoin"

          # Manual override: deploy specific apps or all
          if [ -n "$INPUT_APPS" ] && [ "$INPUT_APPS" != "auto" ]; then
            if [ "$INPUT_APPS" = "all" ]; then
              AFFECTED="$ALL_APPS"
            else
              AFFECTED=$(echo "$INPUT_APPS" | tr ',' ' ')
            fi
            echo "::notice::Manual deploy: $AFFECTED"
          else
            # Auto-detect from git diff
            CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || echo "")

            if [ -z "$CHANGED" ]; then
              echo "::notice::No changes detected — deploying all apps"
              AFFECTED="$ALL_APPS"
            else
              AFFECTED=""

              # Check each app directory for direct changes
              for app in $ALL_APPS; do
                if echo "$CHANGED" | grep -q "^apps/$app/"; then
                  AFFECTED="$AFFECTED $app"
                fi
              done

              # Shared packages changed → deploy all apps
              if echo "$CHANGED" | grep -q "^packages/"; then
                echo "::notice::Shared package changed — deploying all apps"
                AFFECTED="$ALL_APPS"
              fi

              # Root config changed → deploy all apps
              if echo "$CHANGED" | grep -qE "^(package\.json|pnpm-lock\.yaml|turbo\.json|\.env)"; then
                echo "::notice::Root config changed — deploying all apps"
                AFFECTED="$ALL_APPS"
              fi

              # Deduplicate
              AFFECTED=$(echo "$AFFECTED" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
            fi
          fi

          if [ -z "$AFFECTED" ]; then
            echo "::notice::No apps affected — skipping deploy"
            echo "has-apps=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "app-list=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has-apps=true" >> "$GITHUB_OUTPUT"
          echo "app-list=$AFFECTED" >> "$GITHUB_OUTPUT"

          # Build matrix JSON with project IDs
          MATRIX="["
          FIRST=true
          for app in $AFFECTED; do
            case "$app" in
              api)        PID="prj_zk6EQijYXwd9L7BccuBssi436ktM" ;;
              admin)      PID="prj_7sEFDg4MH6C26nJPjrukK86QdwfG" ;;
              marketing)  PID="prj_frTIYlnONVPLNIjKnQpINiGb5lm0" ;;
              docs)       PID="prj_OPwr0FrgcK17AOBCyoj4JIilJ9S1" ;;
              revealcoin) PID="prj_XDiPXngciRytGA8j0vNIDz7hENRM" ;;
              *) echo "::warning::Unknown app: $app"; continue ;;
            esac
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX="$MATRIX,"; fi
            MATRIX="$MATRIX{\"app\":\"$app\",\"project-id\":\"$PID\"}"
          done
          MATRIX="$MATRIX]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying: $AFFECTED"

  # ---------------------------------------------------------------------------
  # Deploy affected apps in parallel
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, migrate, detect]
    if: needs.detect.outputs.has-apps == 'true'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.detect.outputs.sha }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}

      # Critical env validation runs upstream in the `validate` job for the
      # api project (mirrors validateStartup format + presence checks). The
      # previous in-deploy bash grep against `vercel env ls` output covered
      # name-presence only and missed every value-format rule — replaced
      # here as part of GAP-125. Admin pre-deploy validation is tracked as
      # a follow-up; today admin's instrumentation handles env validation
      # at boot (gentler, failOnMissing: false).

      - name: Override Vercel project settings for CI
        run: |
          if [ -f .vercel/project.json ]; then
            jq '.settings.installCommand = "" | .settings.buildCommand = "pnpm turbo build --filter=${{ matrix.app }}"' .vercel/project.json > .vercel/project.json.tmp
            mv .vercel/project.json.tmp .vercel/project.json
          fi

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}
          SKIP_ENV_VALIDATION: "true"

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::${{ matrix.app }} deployed to $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ matrix.project-id }}

  # ---------------------------------------------------------------------------
  # Post-deploy smoke test
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect, deploy]

    steps:
      # pnpm is required by the "Rollback on failure" step below. Without
      # this setup, the rollback fails with `pnpm: command not found`
      # before it can install vercel CLI, which leaves a broken deploy
      # live (precedent: 2026-04-25 #540 incident, GAP-122).
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Health check — API (readiness probe)
        run: |
          API_URL="${REVEALUI_API_URL:-https://api.revealui.com}"
          echo "Checking $API_URL/health/ready (DB + memory + config)..."
          for i in $(seq 1 12); do
            RESP=$(curl -sf "$API_URL/health/ready" 2>/dev/null || echo "")
            if [ -n "$RESP" ]; then
              echo "API ready: $RESP"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::error::API readiness check failed after 2 minutes"
          exit 1

      - name: Health check — Admin
        run: |
          ADMIN_URL="${REVEALUI_ADMIN_URL:-https://admin.revealui.com}"
          echo "Checking $ADMIN_URL..."
          for i in $(seq 1 12); do
            if curl -sf "$ADMIN_URL" -o /dev/null 2>&1; then
              echo "Admin healthy"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::error::Admin health check failed after 2 minutes"
          exit 1

      - name: Rollback on failure
        if: failure()
        # Per GAP-128: `vercel rollback` with no URL argument is a STATUS
        # QUERY ("checking rollback status..."), not an action. To actually
        # roll back, we must pass the previous-good deployment URL. This
        # step pre-fetches it via `vercel ls --prod` and rolls the alias
        # explicitly, then verifies the alias moved.
        run: |
          set -uo pipefail
          echo "::warning::Smoke test failed — rolling back affected apps"
          pnpm add -g vercel@latest
          APP_LIST="${{ needs.detect.outputs.app-list }}"
          ROLLBACK_FAILED=0
          ROLLBACK_NO_HISTORY=0
          for app in $APP_LIST; do
            case "$app" in
              api)        PID="prj_zk6EQijYXwd9L7BccuBssi436ktM" ;;
              admin)      PID="prj_7sEFDg4MH6C26nJPjrukK86QdwfG" ;;
              marketing)  PID="prj_frTIYlnONVPLNIjKnQpINiGb5lm0" ;;
              docs)       PID="prj_OPwr0FrgcK17AOBCyoj4JIilJ9S1" ;;
              revealcoin) PID="prj_XDiPXngciRytGA8j0vNIDz7hENRM" ;;
              *) continue ;;
            esac

            echo ""
            echo "=== Rolling back $app ($PID) ==="

            # 1. List recent production deployments. Take the second-most-
            #    recent READY one — the most recent IS the broken deploy.
            DEPLOY_LIST=$(VERCEL_PROJECT_ID="$PID" vercel ls --prod --token="$VERCEL_TOKEN" 2>&1 || true)
            PREV_URL=$(printf '%s\n' "$DEPLOY_LIST" \
              | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' \
              | sed -n '2p')

            if [ -z "$PREV_URL" ]; then
              echo "::warning::No previous deployment found for $app — broken deploy is live, manual intervention required"
              ROLLBACK_NO_HISTORY=$((ROLLBACK_NO_HISTORY+1))
              continue
            fi

            echo "Previous good deploy: $PREV_URL"

            # 2. Roll the alias explicitly to that URL.
            if ! VERCEL_PROJECT_ID="$PID" vercel rollback "$PREV_URL" --token="$VERCEL_TOKEN" --yes 2>&1; then
              echo "::warning::vercel rollback command failed for $app"
              ROLLBACK_FAILED=$((ROLLBACK_FAILED+1))
              continue
            fi

            # 3. Verify the alias actually moved by inspecting the
            #    project's current production deploy. Wait briefly for
            #    propagation.
            sleep 5
            CURRENT_URL=$(VERCEL_PROJECT_ID="$PID" vercel ls --prod --token="$VERCEL_TOKEN" 2>&1 \
              | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' \
              | head -n 1)

            if [ "$CURRENT_URL" = "$PREV_URL" ]; then
              echo "✅ Rollback verified: $app production now serving $CURRENT_URL"
            else
              echo "::warning::Rollback issued but verification failed — current=$CURRENT_URL, expected=$PREV_URL"
              ROLLBACK_FAILED=$((ROLLBACK_FAILED+1))
            fi
          done

          echo ""
          echo "=== Rollback summary ==="
          echo "Failed:     $ROLLBACK_FAILED"
          echo "No history: $ROLLBACK_NO_HISTORY"

          # Exit non-zero so the workflow status reflects the failed
          # smoke test AND the rollback outcome. If any rollback failed
          # or had no history, that's a clear "broken deploy still live"
          # signal that needs human attention.
          if [ "$ROLLBACK_FAILED" -gt 0 ] || [ "$ROLLBACK_NO_HISTORY" -gt 0 ]; then
            echo "::error::One or more apps could not be auto-rolled-back — broken deploy may still be live; investigate immediately"
            exit 1
          fi
          echo "::error::Smoke test failed — affected apps were auto-rolled-back successfully; investigate cause before re-deploying"
          exit 1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [detect, deploy]
    if: always()

    steps:
      - name: Output deployment summary
        env:
          DEPLOY_SHA: ${{ needs.detect.outputs.sha }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          DEPLOY_APPS: ${{ needs.detect.outputs.app-list }}
        run: |
          cat <<EOF
          {
            "environment": "production",
            "sha": "$DEPLOY_SHA",
            "status": "$DEPLOY_STATUS",
            "apps": "$DEPLOY_APPS",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

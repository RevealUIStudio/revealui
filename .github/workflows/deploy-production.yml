name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24.12.0"
  PNPM_VERSION: "10.28.2"

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          echo "Running database migrations..."
          pnpm db:migrate
        env:
          POSTGRES_URL: ${{ secrets.PRODUCTION_POSTGRES_URL }}

      - name: Build CMS
        run: pnpm --filter cms run build
        env:
          SKIP_ENV_VALIDATION: true
          NODE_ENV: production

      - name: Deploy to Vercel Production
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./apps/cms
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Wait for deployment to be ready
        id: health_check
        run: |
          url="${{ steps.deploy.outputs.preview-url }}"
          echo "Waiting for deployment at $url"

          for i in {1..15}; do
            if curl -sf "$url/api/health" > /dev/null; then
              echo "Deployment is ready!"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i/15: Deployment not ready yet, waiting 10s..."
            sleep 10
          done

          echo "Deployment did not become ready in time"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Run smoke tests
        if: steps.health_check.outputs.healthy == 'true'
        run: |
          echo "Running smoke tests against ${{ steps.deploy.outputs.preview-url }}"
          url="${{ steps.deploy.outputs.preview-url }}"

          # Health check
          curl -f "$url/api/health" || exit 1

          # Homepage check
          curl -f "$url" > /dev/null || exit 1

          echo "All smoke tests passed!"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          # Add rollback logic here if needed
          exit 1

      - name: Create GitHub release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.version }}';
            const url = '${{ steps.deploy.outputs.preview-url }}';

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Release ${version}`,
              body: `🚀 Deployed to production!\n\n**URL:** ${url}\n**Version:** ${version}\n**Environment:** production`,
              draft: false,
              prerelease: false
            });

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "Version: ${{ inputs.version }}"
          echo "URL: ${{ steps.deploy.outputs.preview-url }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          echo "Please check the logs and consider rolling back."

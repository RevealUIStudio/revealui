name: Security

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]
  schedule:
    - cron: '0 9 * * 1' # weekly Monday 9 AM UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"

jobs:
  # Native security gate (no token needed — uses pnpm audit + custom checks)
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run security gate
        run: pnpm gate:security

  # Secret scanning
  #
  # Uses the gitleaks CLI directly (not the gitleaks-action wrapper) so we can
  # pass --baseline-path. The wrapper does not expose the baseline flag as of
  # v2. Baseline at .gitleaks.baseline.json captures historical-leak
  # fingerprints (rotated values, deleted files); new findings in PRs and
  # scheduled scans still fail the job, baseline entries are suppressed.
  #
  # Refresh cadence + verification: docs/runbooks/gitleaks-baseline.md.
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITLEAKS_VERSION: "8.30.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (with baseline suppression)
        run: |
          gitleaks detect \
            --no-banner \
            --redact \
            --config .gitleaks.toml \
            --baseline-path .gitleaks.baseline.json

  # Static analysis
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: /language:javascript-typescript

  # Dependency review (PRs only)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high

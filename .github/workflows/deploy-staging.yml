name: Deploy to Staging

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: "24.12.0"
  PNPM_VERSION: "10.28.2"

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CMS
        run: pnpm --filter cms run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Deploy to Vercel Staging
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/cms
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Wait for deployment to be ready
        run: |
          url="${{ steps.deploy.outputs.preview-url }}"
          echo "Waiting for deployment at $url"

          for i in {1..10}; do
            if curl -sf "$url" > /dev/null; then
              echo "Deployment is ready!"
              exit 0
            fi
            echo "Attempt $i/10: Deployment not ready yet, waiting 10s..."
            sleep 10
          done

          echo "Deployment did not become ready in time"
          exit 1

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against ${{ steps.deploy.outputs.preview-url }}"
          # Add smoke test commands here
          curl -f "${{ steps.deploy.outputs.preview-url }}/api/health" || exit 1

      - name: Comment on commit
        uses: actions/github-script@v8
        if: success()
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const sha = context.sha.substring(0, 7);

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Deployed to staging!\n\n**URL:** ${url}\n**Commit:** ${sha}\n**Environment:** staging`
            });

name: Preview PR Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.12.0"
  PNPM_VERSION: "10.28.2"

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CMS
        run: pnpm --filter cms run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Deploy to Vercel Preview
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: false
          working-directory: ./apps/cms
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Wait for preview to be ready
        run: |
          url="${{ steps.deploy.outputs.preview-url }}"
          echo "Waiting for preview at $url"

          for i in {1..10}; do
            if curl -sf "$url" > /dev/null; then
              echo "Preview is ready!"
              exit 0
            fi
            echo "Attempt $i/10: Preview not ready yet, waiting 10s..."
            sleep 10
          done

          echo "Preview did not become ready in time"
          exit 1

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment')
            );

            const body = `## 🔍 Preview Deployment

            **URL:** ${url}
            **Commit:** ${sha}
            **Status:** ✅ Ready

            This preview will be automatically updated when you push new commits.`;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

name: Release Management

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release to perform'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - manual
          - dry-run

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_changesets: ${{ steps.check-changesets.outputs.has_changesets }}
      release_type: ${{ steps.determine-release.outputs.type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: check-changesets
        run: |
          if [ -n "$(find .changeset -name '*.md' -not -name 'README.md' -not -name 'config.json' 2>/dev/null)" ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine release type
        id: determine-release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=auto" >> $GITHUB_OUTPUT
          fi

  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare-release
    if: needs.prepare-release.outputs.has_changesets == 'true' || needs.prepare-release.outputs.release_type == 'manual'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Run tests
        run: pnpm test
        continue-on-error: false

      - name: Type check all packages
        run: pnpm typecheck:all

      - name: Lint all packages
        run: pnpm lint

      - name: Run security audit
        run: |
          AUDIT_RESULT=$(pnpm audit --audit-level=high --json 2>/dev/null || echo '{}')
          HIGH=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
          CRITICAL=$(echo "$AUDIT_RESULT" | jq -r '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")

          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Critical vulnerabilities found! Blocking release."
            exit 1
          fi

          if [ "$HIGH" -gt "0" ]; then
            echo "⚠️ High severity vulnerabilities found. Allowing release but please review."
          fi

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-release, validate-release]
    if: needs.prepare-release.outputs.has_changesets == 'true' && needs.prepare-release.outputs.release_type != 'dry-run'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Generate comprehensive changelog from changesets
          pnpm changeset generate-changelog > CHANGELOG_LATEST.md
          echo "📝 Changelog generated for this release"

      - name: Create GitHub release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.changesets.outputs.publishedPackages[0].version }}
          release_name: Release ${{ steps.changesets.outputs.publishedPackages[0].version }}
          body_path: CHANGELOG_LATEST.md
          draft: false
          prerelease: false

      - name: Upload release artifacts
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            CHANGELOG_LATEST.md
            packages/*/dist/
          retention-days: 30

  dry-run:
    name: Dry Run Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare-release
    if: needs.prepare-release.outputs.release_type == 'dry-run'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry run changesets
        run: |
          echo "🔍 Performing dry run of release process..."
          pnpm changeset version --dry-run
          echo "📦 Packages that would be published:"
          pnpm changeset publish --dry-run --output json | jq -r '.[] | "- \(.name)@\(.version)"'
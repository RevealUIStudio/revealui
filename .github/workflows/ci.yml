name: CI

# Two-tier CI gate:
#   test branch: quality + typecheck + unit tests + build (~10 min)
#   main branch: full gate + integration + E2E + coverage (~20 min)
#
# Pipeline: feature/* → PR → test → PR → main → deploy
#
# Optimizations:
#   - Turbo remote cache: build artifacts shared across jobs
#   - PR jobs use --affected: only build/typecheck changed packages
#   - Heavy jobs (integration, E2E, coverage) only run for main

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || secrets.VERCEL_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || 'revealuistudio' }}
  PNPM_INSTALL_FLAGS: "--frozen-lockfile"

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Quality checks (all branches)
  # ---------------------------------------------------------------------------
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Biome lint (hard fail)
        run: pnpm lint:biome

      - name: Any-type audit
        run: pnpm audit:any

      - name: Console audit
        run: pnpm audit:console

      - name: Structure validation
        run: pnpm validate:structure

      - name: Version policy validation
        run: pnpm validate:versions

      - name: Boundary validation (hard fail)
        run: pnpm validate:boundary

      - name: Claim drift validation (hard fail)
        run: pnpm validate:claims

      - name: Migration journal validation (hard fail)
        run: pnpm validate:migrations

      - name: Raw-SQL validation (hard fail)
        run: pnpm validate:raw-sql

      - name: Empty-catch validation (hard fail)
        run: pnpm validate:empty-catch

  # ---------------------------------------------------------------------------
  # Phase 1.5: Drizzle migration apply (all branches)
  #
  # Proves that every drizzle-kit migration in packages/db/migrations applies
  # cleanly against a fresh Postgres. Catches DDL errors that validate:migrations
  # (static checks) and unit tests (PGlite) cannot: non-idempotent ADD CONSTRAINT,
  # extension prerequisites, type mismatches, out-of-band .sql files that mutate
  # prod schema without going through drizzle-kit.
  # ---------------------------------------------------------------------------
  db-migrations:
    name: Drizzle Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    services:
      postgres:
        # pgvector/pgvector bundles pgvector into postgres:16. Migration
        # 0000 starts with `CREATE EXTENSION IF NOT EXISTS vector`, which
        # vanilla postgres:16 cannot satisfy (extension not available).
        # drizzle-kit's TTY spinner silently eats the error, so this image
        # choice is what makes the failure surface at all.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: revealui_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Build @revealui/db and its workspace deps (drizzle.config.ts reads from dist/)
        run: pnpm --filter '@revealui/db...' build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Apply migrations to fresh Postgres (hard fail)
        run: pnpm --filter @revealui/db db:migrate
        env:
          POSTGRES_URL: "postgresql://test:test@localhost:5432/revealui_migrations"
          DATABASE_URL: "postgresql://test:test@localhost:5432/revealui_migrations"

  # ---------------------------------------------------------------------------
  # Phase 2: Typecheck (all branches)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # turbo --affected needs merge-base with the target branch.
          # Full history ensures the merge base is always reachable.
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Typecheck affected packages (PRs — hard fail)
        if: github.event_name == 'pull_request'
        run: pnpm turbo typecheck --affected
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Typecheck all packages (push — hard fail)
        if: github.event_name == 'push'
        run: pnpm typecheck:all
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a: Unit tests (all branches)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Build packages (workspace tests resolve some deps from dist/)
        run: pnpm turbo build --filter='./packages/*'
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Run unit tests (hard fail)
        run: pnpm test
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a.1: Integration tests (all PRs + push to main — requires DB)
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: revealui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Build packages (required — integration tests import real dist/)
        run: pnpm --filter './packages/*' build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Run integration tests (hard fail)
        run: pnpm test:integration
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "postgresql://test:test@localhost:5432/revealui_test"
          POSTGRES_URL: "postgresql://test:test@localhost:5432/revealui_test"

  # ---------------------------------------------------------------------------
  # Phase 3a.5: Coverage gate (main only)
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Generate coverage reports
        run: pnpm test:coverage
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Validate coverage (fail on 0% packages)
        run: pnpm coverage:check -- --fail-on-zero

      - name: Upload coverage reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: coverage-reports
          path: |
            apps/*/coverage/
            packages/*/coverage/
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 3b: Build (all branches)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # turbo --affected needs merge-base with the target branch.
          # Full history ensures the merge base is always reachable.
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Build affected packages (PRs — hard fail)
        if: github.event_name == 'pull_request'
        run: pnpm turbo build --affected
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Build all (push to protected branches — hard fail)
        if: github.event_name == 'push'
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Validate generated types are in sync (hard fail)
        run: |
          pnpm --filter @revealui/db generate:all
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated types are out of sync. Run 'pnpm --filter @revealui/db generate:all' and commit."
            git diff --stat
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Phase 4: E2E smoke tests (main only)
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start API server
        run: pnpm --filter api start &
        env:
          SKIP_ENV_VALIDATION: "true"
          NODE_ENV: "development"
          POSTGRES_URL: "postgresql://test:test@localhost:5432/smoke"

      - name: Start Admin server
        run: pnpm --filter admin start &
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start marketing server
        run: pnpm --filter marketing start &
        env:
          SKIP_ENV_VALIDATION: "true"
          PORT: "3002"
          NEXT_PUBLIC_API_URL: "http://localhost:3004"

      - name: Wait for servers
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:3004/health/live > /dev/null 2>&1 && \
            curl -sf http://localhost:4000 > /dev/null 2>&1 && \
            curl -sf http://localhost:3002 > /dev/null 2>&1 && \
            echo "All three servers ready" && break || \
            echo "Waiting for servers... ($i/40)" && sleep 3
          done
          curl -sf http://localhost:3004/health/live > /dev/null 2>&1 && \
          curl -sf http://localhost:4000 > /dev/null 2>&1 && \
          curl -sf http://localhost:3002 > /dev/null 2>&1 || \
          (echo "::error::Servers failed to start within 120s" && exit 1)

      - name: Run E2E smoke tests
        run: pnpm test:e2e -- --project=chromium e2e/smoke.e2e.ts
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"
          API_BASE_URL: "http://localhost:3004"
          PLAYWRIGHT_BASE_URL: "http://localhost:4000"
          MARKETING_BASE_URL: "http://localhost:3002"

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 5: Accessibility E2E (main only)
  # ---------------------------------------------------------------------------
  e2e-accessibility:
    name: Accessibility (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build apps
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start Admin server
        run: pnpm --filter admin start &
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start marketing server
        run: pnpm --filter marketing start &
        env:
          SKIP_ENV_VALIDATION: "true"
          PORT: "3002"
          NEXT_PUBLIC_API_URL: "http://localhost:3004"

      - name: Wait for servers
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:4000 > /dev/null 2>&1 && \
            curl -sf http://localhost:3002 > /dev/null 2>&1 && \
            echo "Both servers ready" && break || \
            echo "Waiting for servers... ($i/40)" && sleep 3
          done

      - name: Run accessibility tests (fail on critical violations)
        run: pnpm test:e2e -- --project=chromium e2e/accessibility.e2e.ts
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:4000"
          MARKETING_BASE_URL: "http://localhost:3002"

      - name: Upload accessibility results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: accessibility-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 6: Visual regression (main only)
  # ---------------------------------------------------------------------------
  e2e-visual:
    name: Visual Regression (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build apps
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start Admin server
        run: pnpm --filter admin start &
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Wait for Admin
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:4000 > /dev/null 2>&1 && echo "Admin ready" && break || \
            echo "Waiting for Admin... ($i/40)" && sleep 3
          done

      - name: Run visual regression tests
        run: npx playwright test --project=chromium e2e/visual-snapshots.e2e.ts
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Upload visual results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: visual-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # CI Feedback — notify harness daemon of CI results
  # ---------------------------------------------------------------------------
  ci-feedback:
    name: CI Feedback
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [quality, typecheck, test-unit, db-migrations, build]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Determine CI result
        id: result
        run: |
          if [[ "${{ needs.quality.result }}" == "failure" ]]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "failed_job=quality" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.typecheck.result }}" == "failure" ]]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "failed_job=typecheck" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.test-unit.result }}" == "failure" ]]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "failed_job=test-unit" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.db-migrations.result }}" == "failure" ]]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "failed_job=db-migrations" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "failed_job=build" >> "$GITHUB_OUTPUT"
          else
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "failed_job=" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to harness daemon
        if: vars.HARNESS_GATEWAY_URL != ''
        continue-on-error: true
        run: |
          curl -sf -X POST "${{ vars.HARNESS_GATEWAY_URL }}/rpc" \
            -H "Content-Type: application/json" \
            -d '{
              "jsonrpc": "2.0",
              "id": 1,
              "method": "ci.report",
              "params": {
                "prNumber": ${{ github.event.pull_request.number }},
                "branch": "${{ github.head_ref }}",
                "success": ${{ steps.result.outputs.success }},
                "failedJob": "${{ steps.result.outputs.failed_job }}",
                "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }'

name: CI

# Mirrors local `pnpm gate` — same hard-fail policy:
#   Hard fail: Biome lint, boundary, typecheck, unit tests, build
#   Hard fail (main only): integration tests (requires DB)
#   Warn-only: audits, structure
#
# PRs: quality + typecheck + package build + unit tests + E2E smoke (~10 min).
# main: full build including apps + integration tests + E2E smoke (~15 min).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Quality checks (parallel, fast)
  # Hard fail: Biome lint, boundary
  # Warn-only: audits, structure
  # ---------------------------------------------------------------------------
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint (hard fail)
        run: pnpm lint:biome

      - name: Any-type audit (warn-only)
        run: pnpm audit:any || echo "any-type warnings — not blocking"
        continue-on-error: true

      - name: Console audit (warn-only)
        run: pnpm audit:console || echo "console warnings — not blocking"
        continue-on-error: true

      - name: Structure validation (warn-only)
        run: pnpm validate:structure || echo "structure warnings — not blocking"
        continue-on-error: true

      - name: Boundary validation (hard fail)
        run: pnpm validate:boundary

  # ---------------------------------------------------------------------------
  # Phase 2: Typecheck (serial, hard fail)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages (hard fail)
        run: pnpm typecheck:all
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a: Unit tests (hard fail)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (hard fail)
        run: pnpm test
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a.1: Integration tests (hard fail, requires DB — main only)
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: revealui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests (hard fail)
        run: pnpm test:integration
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "postgresql://test:test@localhost:5432/revealui_test"
          POSTGRES_URL: "postgresql://test:test@localhost:5432/revealui_test"

  # ---------------------------------------------------------------------------
  # Phase 3a.5: Coverage artifacts (warn-only)
  # Produces workspace coverage reports and uploads them for inspection.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate coverage reports (warn-only)
        run: pnpm test:coverage || echo "Coverage generation had failures — not blocking"
        continue-on-error: true
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Validate coverage (fail on 0% packages)
        run: pnpm coverage:check -- --fail-on-zero

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            apps/*/coverage/
            packages/*/coverage/
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 3b: Build
  #   - PRs: packages only (hard fail, ~5 min) — catches import/export breaks
  #   - main: full build including apps (hard fail, ~15 min)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, typecheck]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (hard fail)
        if: github.event_name == 'pull_request'
        run: pnpm --filter './packages/*' build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Build all (hard fail)
        if: github.ref == 'refs/heads/main'
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 4: E2E smoke tests (warn-only — Playwright chromium only)
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality, typecheck]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Run E2E smoke tests
        run: pnpm test:e2e -- --project=chromium e2e/smoke.e2e.ts
        continue-on-error: true
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

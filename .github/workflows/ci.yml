name: CI

# Mirrors local `pnpm gate` — same hard-fail policy:
#   Hard fail: Biome lint, boundary, typecheck, unit tests, build
#   Hard fail (main/test): integration tests (requires DB)
#   Warn-only: audits, structure
#
# Pipeline: feature/* → test → main
#   PRs to test/main trigger CI.
#   test/main: full build + integration tests + E2E smoke + accessibility (~15 min)
#
# Optimizations:
#   - Turbo remote cache: build artifacts shared across jobs (TURBO_TOKEN + TURBO_TEAM)
#   - PR jobs use --affected: only build/typecheck changed packages
#   - Build runs in parallel with typecheck (turbo cache provides build artifacts)
#   - E2E jobs wait for build (cache hit → near-instant rebuild)
#
# Prerequisites (owner action — remote caching is opportunistic, CI works without these):
#   1. Enable Vercel Remote Caching: https://vercel.com/docs/monorepos/remote-caching
#   2. Add repository secret  TURBO_TOKEN  — Vercel access token with remote cache scope
#   3. Add repository variable TURBO_TEAM   — Vercel team slug (e.g. "revealuistudio")

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  # Lockfile policy: strict on all CI branches (test/main)
  # --frozen-lockfile: fail if lockfile is out of sync (supply chain protection)
  PNPM_INSTALL_FLAGS: "--frozen-lockfile"

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Quality checks (parallel, fast)
  # Hard fail: Biome lint, boundary
  # Warn-only: audits, structure
  # ---------------------------------------------------------------------------
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Biome lint (hard fail)
        run: pnpm lint:biome

      - name: Any-type audit (warn-only)
        run: pnpm audit:any || echo "any-type warnings — not blocking"
        continue-on-error: true

      - name: Console audit (warn-only)
        run: pnpm audit:console || echo "console warnings — not blocking"
        continue-on-error: true

      - name: Structure validation (warn-only)
        run: pnpm validate:structure || echo "structure warnings — not blocking"
        continue-on-error: true

      - name: Version policy validation (warn-only)
        run: pnpm validate:versions || echo "version policy warnings — not blocking"
        continue-on-error: true

      - name: Boundary validation (hard fail)
        run: pnpm validate:boundary

  # ---------------------------------------------------------------------------
  # Phase 2: Typecheck (serial, hard fail)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Typecheck affected packages (PRs — hard fail)
        if: github.event_name == 'pull_request'
        run: pnpm turbo typecheck --affected
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Typecheck all packages (push — hard fail)
        if: github.event_name == 'push'
        run: pnpm typecheck:all
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a: Unit tests (hard fail)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Run unit tests (hard fail)
        run: pnpm test
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a.1: Integration tests (hard fail, requires DB — main/test only)
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: revealui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Build packages (required — integration tests import real dist/)
        run: pnpm --filter './packages/*' build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Run integration tests (hard fail)
        run: pnpm test:integration
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "postgresql://test:test@localhost:5432/revealui_test"
          POSTGRES_URL: "postgresql://test:test@localhost:5432/revealui_test"

  # ---------------------------------------------------------------------------
  # Phase 3a.5: Coverage gate
  # Generates coverage reports and fails if any package has 0% line coverage.
  # Report generation is warn-only (continue-on-error); zero-coverage check is hard fail.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Generate coverage reports (warn-only)
        run: pnpm test:coverage || echo "Coverage generation had failures — not blocking"
        continue-on-error: true
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Validate coverage (fail on 0% packages)
        run: pnpm coverage:check -- --fail-on-zero

      - name: Upload coverage reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: coverage-reports
          path: |
            apps/*/coverage/
            packages/*/coverage/
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 3b: Build
  #   - PRs: packages only (hard fail, ~5 min) — catches import/export breaks
  #   - main: full build including apps (hard fail, ~15 min)
  # Runs in parallel with typecheck (turbo remote cache shares build artifacts)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Build affected packages (PRs — hard fail)
        if: github.event_name == 'pull_request'
        run: pnpm turbo build --affected
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Build all (push to protected branches — hard fail)
        if: github.event_name == 'push'
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 4: E2E smoke tests (warn-only — Playwright chromium only)
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality, build]
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Run E2E smoke tests
        run: pnpm test:e2e -- --project=chromium e2e/smoke.e2e.ts
        continue-on-error: true
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 5: Accessibility E2E (hard fail on critical violations — R5-L7)
  # Runs @axe-core/playwright checks on login, dashboard, settings, pricing.
  # Fails CI if any critical or serious WCAG 2.1 AA violations are found.
  # ---------------------------------------------------------------------------
  e2e-accessibility:
    name: Accessibility (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, build]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build apps
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start CMS server
        run: pnpm --filter cms start &
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start marketing server
        run: pnpm --filter marketing start &
        env:
          SKIP_ENV_VALIDATION: "true"
          PORT: "3002"

      - name: Wait for servers
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:4000 > /dev/null 2>&1 && \
            curl -sf http://localhost:3002 > /dev/null 2>&1 && \
            echo "Both servers ready" && break || \
            echo "Waiting for servers... ($i/40)" && sleep 3
          done

      - name: Run accessibility tests (fail on critical violations)
        run: pnpm test:e2e -- --project=chromium e2e/accessibility.e2e.ts
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:4000"
          MARKETING_BASE_URL: "http://localhost:3002"

      - name: Upload accessibility results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: accessibility-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Phase 6: Visual regression (warn-only — R5-L8)
  # Playwright native screenshot comparison. Warn-only until baselines are
  # committed. To capture baselines: pnpm test:e2e:visual:update
  # ---------------------------------------------------------------------------
  e2e-visual:
    name: Visual Regression (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, build]
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ env.PNPM_INSTALL_FLAGS }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build apps
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Start CMS server
        run: pnpm --filter cms start &
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Wait for CMS
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:4000 > /dev/null 2>&1 && echo "CMS ready" && break || \
            echo "Waiting for CMS... ($i/40)" && sleep 3
          done

      - name: Run visual regression tests (warn-only until baselines committed)
        run: pnpm test:e2e -- --project=chromium e2e/visual-snapshots.e2e.ts
        continue-on-error: true
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Upload visual results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: visual-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

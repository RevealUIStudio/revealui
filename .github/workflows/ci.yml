name: CI

# Mirrors local `pnpm gate` — same hard-fail policy:
#   Hard fail: Biome lint, typecheck, build
#   Warn-only: audits, structure, boundary, tests
#
# Build runs only on push to main (too slow for PRs; ~15 min).
# PRs get quality + typecheck + tests for fast feedback (~5 min).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Quality checks (parallel, fast)
  # Hard fail: Biome lint
  # Warn-only: audits, structure, boundary
  # ---------------------------------------------------------------------------
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint (hard fail)
        run: pnpm lint:biome

      - name: Any-type audit (warn-only)
        run: pnpm audit:any || echo "any-type warnings — not blocking"
        continue-on-error: true

      - name: Console audit (warn-only)
        run: pnpm audit:console || echo "console warnings — not blocking"
        continue-on-error: true

      - name: Structure validation (warn-only)
        run: pnpm validate:structure || echo "structure warnings — not blocking"
        continue-on-error: true

      - name: Boundary validation (warn-only)
        run: pnpm validate:boundary || echo "boundary warnings — not blocking"
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Phase 2: Typecheck (serial, hard fail)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages (hard fail)
        run: pnpm typecheck:all
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3a: Tests (warn-only — mirrors local gate policy)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (warn-only)
        run: pnpm test || echo "Test failures — not blocking (warn-only policy)"
        continue-on-error: true
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 3b: Build (hard fail — main branch only, PRs skip this)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, typecheck]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (hard fail)
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

  # ---------------------------------------------------------------------------
  # Phase 4: E2E smoke tests (warn-only — Playwright chromium only)
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality, typecheck]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Run E2E smoke tests
        run: pnpm test:e2e -- --project=chromium e2e/smoke.e2e.ts
        continue-on-error: true
        env:
          CI: "true"
          SKIP_ENV_VALIDATION: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

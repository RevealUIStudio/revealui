name: Validate Documentation

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/validate/validate-docs-comprehensive.ts'
      - '.github/workflows/validate-docs.yml'
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/validate/validate-docs-comprehensive.ts'
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: validate-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.13.0"
  PNPM_VERSION: "10.28.2"

jobs:
  validate-documentation:
    name: Validate Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run documentation validation
        id: validate
        run: |
          # Run validation and save JSON output
          pnpm validate:docs:json > validation-results.json || true

          # Parse results
          TOTAL_ISSUES=$(jq -r '.data.total_issues' validation-results.json)
          CRITICAL=$(jq -r '.data.by_severity.critical' validation-results.json)
          HIGH=$(jq -r '.data.by_severity.high' validation-results.json)
          ACCURACY=$(jq -r '.data.accuracy_score' validation-results.json)

          # Export for use in other steps
          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

          # Display summary
          echo "## Documentation Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Files validated:** $(jq -r '.data.total_files' validation-results.json)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total issues:** $TOTAL_ISSUES" >> $GITHUB_STEP_SUMMARY
          echo "- **Accuracy score:** ${ACCURACY}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Issues by Severity" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- 🟠 High: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 Medium: $(jq -r '.data.by_severity.medium' validation-results.json)" >> $GITHUB_STEP_SUMMARY
          echo "- ⚪ Low: $(jq -r '.data.by_severity.low' validation-results.json)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Issues by Category" >> $GITHUB_STEP_SUMMARY
          jq -r '.data.by_category | to_entries[] | "- \(.key): \(.value)"' validation-results.json >> $GITHUB_STEP_SUMMARY

          # Fail if critical issues found
          if [ "$CRITICAL" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Build failed:** Found $CRITICAL critical documentation issues" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: documentation-validation-results
          path: validation-results.json
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.validate.outputs.critical > 0
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('validation-results.json', 'utf8'));

            const critical = results.data.by_severity.critical;
            const high = results.data.by_severity.high;
            const total = results.data.total_issues;
            const accuracy = results.data.accuracy_score;

            // Get first 10 critical issues for comment
            const criticalIssues = results.data.issues
              .filter(i => i.severity === 'critical')
              .slice(0, 10);

            let comment = `## 📋 Documentation Validation Report\n\n`;
            comment += `- **Total Issues:** ${total}\n`;
            comment += `- **Accuracy Score:** ${accuracy}%\n\n`;
            comment += `### Issues by Severity\n`;
            comment += `- 🔴 Critical: ${critical}\n`;
            comment += `- 🟠 High: ${high}\n`;
            comment += `- 🟡 Medium: ${results.data.by_severity.medium}\n\n`;

            if (criticalIssues.length > 0) {
              comment += `### 🔴 Critical Issues (showing ${criticalIssues.length} of ${critical})\n\n`;
              for (const issue of criticalIssues) {
                comment += `#### ${issue.file}${issue.line ? `:${issue.line}` : ''}\n`;
                comment += `- **Category:** ${issue.category}\n`;
                comment += `- **Message:** ${issue.message}\n`;
                if (issue.suggested_fix) {
                  comment += `- **Suggested fix:** \`${issue.suggested_fix}\`\n`;
                }
                comment += `\n`;
              }
            }

            comment += `\n---\n`;
            comment += `💡 **Tip:** Run \`pnpm validate:docs\` locally to see all issues.\n`;
            comment += `📊 Download full validation results from the workflow artifacts.\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Final status
        if: always()
        run: |
          CRITICAL="${{ steps.validate.outputs.critical }}"
          if [ "$CRITICAL" -eq 0 ]; then
            echo "✅ Documentation validation passed!"
          else
            echo "❌ Documentation validation failed with $CRITICAL critical issues"
            exit 1
          fi

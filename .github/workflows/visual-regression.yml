name: Visual Regression Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Cancel in-progress runs when a new workflow with the same group name is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Build packages
        run: pnpm run build --filter @revealui/auth --filter @revealui/config --filter @revealui/contracts --filter @revealui/core --filter @revealui/db --filter services --filter @revealui/ai

      - name: Run visual regression tests
        run: pnpm test:e2e:visual:chromium
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          compression-level: 9

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          compression-level: 9

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            e2e/__snapshots__/**/*-actual.png
            e2e/__snapshots__/**/*-diff.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const comment = `## ⚠️ Visual Regression Tests Failed

            Visual changes detected in this PR. Please review the visual diffs to ensure changes are intentional.

            **📊 Test Results:** [View Full Report](${runUrl})

            **📸 Visual Diffs:** Download the \`visual-diffs\` artifact from the workflow run to see what changed.

            ### Next Steps:
            - If changes are intentional: Update snapshots with \`pnpm test:e2e:visual:update:chromium\`
            - If changes are unintentional: Fix the UI regression

            <details>
            <summary>How to update snapshots</summary>

            \`\`\`bash
            # Pull the latest changes
            git pull origin ${context.ref}

            # Update snapshots
            pnpm test:e2e:visual:update:chromium

            # Commit the updated snapshots
            git add e2e/__snapshots__
            git commit -m "test(e2e): Update visual snapshots"
            git push
            \`\`\`
            </details>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Add workflow summary
        if: always()
        run: |
          echo "## 📸 Visual Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "playwright-report/index.html" ]; then
            echo "✅ Tests completed. Download the \`playwright-report\` artifact to view detailed results." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Playwright Report**: Full test report with screenshots" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 **Test Results**: Raw test result files" >> $GITHUB_STEP_SUMMARY
          echo "- 📸 **Visual Diffs**: Before/after comparison images (on failure)" >> $GITHUB_STEP_SUMMARY

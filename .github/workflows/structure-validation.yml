name: Structure Validation

on:
  pull_request:
    paths:
      - '*.md'
      - 'k8s/**'
      - 'docker/**'
      - 'mcp/**'
      - 'package-templates/**'
      - 'infrastructure/**'
      - '.revealui/templates/**'
  push:
    branches: [main]

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate directory structure
        run: pnpm validate:structure

      - name: Check for markdown files in root
        run: |
          FOUND_MD=$(find . -maxdepth 1 -name "*.md" -type f -not -name "README.md" -not -name "CHANGELOG.md" -not -name "CONTRIBUTING.md" | wc -l)

          if [ $FOUND_MD -gt 0 ]; then
            echo "❌ Found unauthorized markdown files in root:"
            find . -maxdepth 1 -name "*.md" -type f -not -name "README.md" -not -name "CHANGELOG.md" -not -name "CONTRIBUTING.md"
            echo "These files should be in docs/"
            exit 1
          fi

          echo "✅ Root directory is clean"

      - name: Check infrastructure structure
        run: |
          if [ -d "k8s" ] || [ -d "docker" ]; then
            echo "❌ k8s/ or docker/ found in root. These should be in infrastructure/"
            exit 1
          fi

          if [ ! -d "infrastructure/k8s" ] || [ ! -d "infrastructure/docker" ]; then
            echo "❌ Missing infrastructure/k8s or infrastructure/docker"
            exit 1
          fi

          echo "✅ Infrastructure folders correctly organized"

      - name: Check templates location
        run: |
          if [ -d "package-templates" ] || [ -d "templates" ]; then
            echo "❌ package-templates/ or templates/ found in root"
            echo "Templates should be in .revealui/templates/"
            exit 1
          fi

          if [ ! -d ".revealui/templates" ]; then
            echo "❌ .revealui/templates/ directory not found"
            exit 1
          fi

          echo "✅ Templates correctly located in .revealui/"

      - name: Check MCP integration
        run: |
          if [ -d "mcp" ]; then
            echo "❌ mcp/ found in root. MCP should be in packages/mcp/"
            exit 1
          fi

          if [ ! -d "packages/mcp" ]; then
            echo "❌ packages/mcp/ directory not found"
            exit 1
          fi

          echo "✅ MCP correctly integrated in packages/"

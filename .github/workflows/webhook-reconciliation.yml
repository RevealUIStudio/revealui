name: Webhook Reconciliation Check

# Weekly check for unreconciled webhook events — payments that were captured
# but never fulfilled due to processing failures with stuck idempotency markers.
#
# Schedule: Every Monday at 08:00 UTC (03:00 ET)
# Manual: workflow_dispatch for on-demand checks

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"

jobs:
  check:
    name: Check Unreconciled Webhooks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Query unreconciled webhooks
        id: query
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          OUTPUT=$(pnpm tsx scripts/commands/database/check-unreconciled.ts 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "output=$OUTPUT" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -eq 1 ]; then
            COUNT=$(echo "$OUTPUT" | jq -r '.count')
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "::warning::Found $COUNT unreconciled webhook event(s)"
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No unreconciled webhooks found"
          else
            echo "::error::Check script failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Create or update issue
        if: steps.query.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT="${{ steps.query.outputs.count }}"
          OUTPUT="${{ steps.query.outputs.output }}"

          # Build issue body with event details
          BODY="## Unreconciled Webhook Events

          **$COUNT** webhook event(s) failed processing and could not clean up their idempotency markers. These represent payments that may not have been fulfilled.

          ### Action Required
          For each event below:
          1. Look up the event in the [Stripe Dashboard](https://dashboard.stripe.com/events)
          2. Verify whether the customer received their license
          3. If not: manually provision the license or issue a refund
          4. Mark resolved in the database: \`UPDATE unreconciled_webhooks SET resolved_at = NOW(), resolved_by = 'manual' WHERE event_id = '<id>'\`

          ### Events
          \`\`\`json
          $(echo "$OUTPUT" | jq '.rows')
          \`\`\`

          ---
          *Generated by webhook-reconciliation.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)*"

          # Check for existing open issue
          EXISTING=$(gh issue list --label "webhook-reconciliation" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create \
              --title "Action Required: $COUNT unreconciled webhook event(s)" \
              --body "$BODY" \
              --label "webhook-reconciliation,billing,priority:high"
            echo "Created new reconciliation issue"
          fi

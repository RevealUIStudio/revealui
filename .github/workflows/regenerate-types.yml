name: Regenerate Types

on:
  workflow_dispatch:

jobs:
  regenerate-supabase-types:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Supabase types
        run: pnpm generate:supabase-types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            🔄 chore: regenerate Supabase types

            Auto-generated by GitHub Actions workflow
          title: '🔄 Regenerate Supabase Types'
          body: |
            ## 🤖 Automated Type Regeneration

            This PR contains automatically regenerated Supabase TypeScript types.

            ### Changes
            - Updated Supabase database type definitions
            - Refreshed generated types for better type safety

            ### Generated Files
            - `packages/services/src/supabase/types.ts`
            - `packages/services/src/generated/types/supabase.ts`

            ---
            🤖 This PR was automatically created by the [Regenerate Types workflow](.github/workflows/regenerate-types.yml)
          branch: automated/regenerate-types
          delete-branch: true
          labels: |
            automated
            dependencies
            typescript
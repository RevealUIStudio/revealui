name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dependencies:
    name: Check for dependency updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: cursor
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: 'pnpm'

      - name: Check for outdated packages
        run: |
          pnpm outdated --format json > outdated.json || true
          cat outdated.json

      - name: Security audit
        run: |
          pnpm audit --json > audit.json || true
          cat audit.json

      - name: Create issue for updates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let outdatedPackages = [];
            try {
              const outdated = JSON.parse(fs.readFileSync('outdated.json', 'utf8'));
              outdatedPackages = Object.entries(outdated).map(([name, info]) => 
                `- **${name}**: ${info.current} → ${info.latest}`
              );
            } catch (e) {
              outdatedPackages = ['No outdated packages found'];
            }
            
            let vulnerabilities = [];
            try {
              const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
              if (audit.metadata) {
                const { low, moderate, high, critical } = audit.metadata.vulnerabilities;
                vulnerabilities = [
                  `- Critical: ${critical}`,
                  `- High: ${high}`,
                  `- Moderate: ${moderate}`,
                  `- Low: ${low}`
                ];
              }
            } catch (e) {
              vulnerabilities = ['No vulnerabilities data available'];
            }
            
            const body = `## 📦 Weekly Dependency Update Report
            
            ### Outdated Packages
            ${outdatedPackages.join('\n')}
            
            ### Security Vulnerabilities
            ${vulnerabilities.join('\n')}
            
            ### Recommended Actions
            1. Review outdated packages and update non-breaking changes
            2. Address any high or critical security vulnerabilities immediately
            3. Test updates in staging environment before merging
            
            **Auto-generated by Dependency Update workflow**`;
            
            // Check if issue already exists this week
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies',
              per_page: 1
            });
            
            const weeklyIssue = issues.data.find(issue => 
              issue.title.includes('Weekly Dependency Update') && 
              new Date(issue.created_at) > new Date(Date.now() - 7 * 24 * 60 * 60 * 1000)
            );
            
            if (!weeklyIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Weekly Dependency Update Report - ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['dependencies', 'security']
              });
            }


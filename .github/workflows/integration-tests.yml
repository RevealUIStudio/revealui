name: Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_revealui
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for database
        run: |
          until pg_isready -h localhost -p 5432 -U test; do
            echo "Waiting for database..."
            sleep 1
          done

      - name: Run migrations
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
        run: |
          pnpm --filter @revealui/db db:push

      - name: Enable pgvector extension
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
        run: |
          PGPASSWORD=test psql -h localhost -U test -d test_revealui -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run integration tests
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test_revealui
          DATABASE_URL: postgresql://test:test@localhost:5432/test_revealui
        run: |
          pnpm test:integration:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

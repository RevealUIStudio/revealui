name: Check Vultr Model Availability

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  check-vultr-model:
    name: Check Vultr Model
    runs-on: ubuntu-latest
    if: secrets.VULTR_API_KEY != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          echo "VULTR_API_KEY=${{ secrets.VULTR_API_KEY }}" > .env
          # If you want to override model from workflow inputs, set VULTR_MODEL here
          if [ -n "${{ github.event.inputs.vultr_model || '' }}" ]; then
            echo "VULTR_MODEL=${{ github.event.inputs.vultr_model }}" >> .env
          fi

      - name: Make script executable
        run: chmod +x scripts/check-vultr-model.sh

      - name: Run Vultr model check
        run: scripts/check-vultr-model.sh
        env:
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}

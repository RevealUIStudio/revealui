name: Release Pro Packages

# As of April 2026, Pro packages (ai, harnesses) are Fair Source (FSL-1.1-MIT)
# and live in the public repo. They are published through the normal changeset
# flow via release.yml — this workflow is no longer needed.
#
# Kept for backwards compatibility with any external references.

on:
  workflow_dispatch:

jobs:
  info:
    name: Pro packages publish via normal changeset flow
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "::notice::Pro packages (ai, harnesses) are now Fair Source (FSL-1.1-MIT) in the public repo."
          echo "::notice::They publish through the normal changeset flow via release.yml."
          echo "::notice::Run 'pnpm changeset' to create a changeset, then merge to main for release."

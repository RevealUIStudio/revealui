name: Release Pro Packages

# Pro package source (packages/ai, packages/harnesses) lives in a private
# upstream repo as part of the OSS/Pro separation.
#
# To publish Pro packages locally: pnpm release:pro
# This workflow is intentionally a no-op stub kept for documentation.

on:
  workflow_dispatch:

jobs:
  info:
    name: Pro packages are published locally or from revealui-jv
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "::notice::Pro packages (ai, harnesses) are published via 'pnpm release:pro' locally or from RevealUIStudio/revealui-jv."
          echo "mcp, editors, and services are OSS — they publish via the normal changeset flow."

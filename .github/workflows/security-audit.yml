name: Security Audit

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: "24.12.0"
  PNPM_VERSION: "10.28.2"

jobs:
  # Dependency vulnerability scanning
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          echo "Running dependency vulnerability scan..."
          pnpm audit --audit-level moderate --json > audit-report.json || true

          # Check for high/critical vulnerabilities
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json 2>/dev/null || echo "0")
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json 2>/dev/null || echo "0")
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-report.json 2>/dev/null || echo "0")
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-report.json 2>/dev/null || echo "0")

          echo ""
          echo "📊 Vulnerability Summary:"
          echo "========================"
          echo "Critical: $CRITICAL"
          echo "High: $HIGH"
          echo "Moderate: $MODERATE"
          echo "Low: $LOW"
          echo ""

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Found critical or high severity vulnerabilities"
            echo "Run 'pnpm audit' locally to see details"
            echo "Run 'pnpm audit --fix' to attempt automatic fixes"
            exit 1
          fi

          if [ "$MODERATE" -gt 0 ]; then
            echo "⚠️  Found $MODERATE moderate severity vulnerabilities"
            echo "Consider running 'pnpm audit --fix' to address them"
          else
            echo "✅ No critical or high severity vulnerabilities found"
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-audit-report
          path: audit-report.json
          retention-days: 30

  # Hardcoded secrets/credentials scan
  secrets-scan:
    name: Secrets & Credentials Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for secret scanning

      - name: Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          echo ""

          # Patterns to search for
          PATTERNS=(
            "password\s*=\s*['\"][^'\"]{8,}"
            "api[_-]?key\s*=\s*['\"][^'\"]{20,}"
            "secret\s*=\s*['\"][^'\"]{20,}"
            "token\s*=\s*['\"][^'\"]{20,}"
            "private[_-]?key\s*=\s*['\"][^'\"]{20,}"
            "AKIA[0-9A-Z]{16}" # AWS access key
            "AIza[0-9A-Za-z\\-_]{35}" # Google API key
            "sk_live_[0-9a-zA-Z]{24}" # Stripe live key
            "sk_test_[0-9a-zA-Z]{24}" # Stripe test key
            "postgres://[^@]+:[^@]+@" # Database URLs with credentials
            "mysql://[^@]+:[^@]+@"
            "mongodb://[^@]+:[^@]+@"
          )

          FOUND=0

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -iE "$pattern" -- ':!*.lock' ':!*.md' ':!.github/workflows/*' ':!*.test.*' ':!*.spec.*' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️  Pattern matched: $pattern"
              echo "$MATCHES"
              echo ""
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "❌ Potential secrets or credentials found in code"
            echo "Review matches above and remove any hardcoded secrets"
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"

  # Environment variable security check
  env-security:
    name: Environment Variable Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check .env files
        run: |
          echo "🔍 Checking for committed .env files..."
          echo ""

          # Check if any .env files are committed (excluding .env.example)
          ENV_FILES=$(git ls-files | grep -E '^\.env(\.[^.]+)?$' | grep -v '.env.example' || true)

          if [ -n "$ENV_FILES" ]; then
            echo "❌ Found committed .env files:"
            echo "$ENV_FILES"
            echo ""
            echo "These should be added to .gitignore"
            exit 1
          fi

          echo "✅ No committed .env files found"

      - name: Check for exposed database URLs
        run: |
          echo ""
          echo "🔍 Checking for exposed database URLs..."
          echo ""

          # Check for database URLs with credentials in non-.env files
          DB_URLS=$(git grep -E 'postgres://|mysql://|mongodb://' -- ':!.env*' ':!*.md' ':!.github/workflows/*' ':!*.lock' 2>/dev/null || true)

          if [ -n "$DB_URLS" ]; then
            echo "⚠️  Found database URLs in source files:"
            echo "$DB_URLS"
            echo ""
            echo "Verify these are not production credentials"
            # Don't fail, just warn
          else
            echo "✅ No exposed database URLs found"
          fi

  # Authentication & authorization review
  auth-security:
    name: Auth & Authorization Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for insecure authentication patterns
        run: |
          echo "🔍 Checking for insecure authentication patterns..."
          echo ""

          ISSUES_FOUND=0

          # Check for hardcoded JWT secrets
          if git grep -i 'jwt.*secret.*=.*["\'][a-zA-Z0-9]' -- ':!*.md' ':!.github/workflows/*' 2>/dev/null; then
            echo "⚠️  Found potential hardcoded JWT secrets"
            ISSUES_FOUND=1
          fi

          # Check for weak password validation
          if git grep -E 'password.*length.*<\s*[1-7]' -- ':!*.md' 2>/dev/null; then
            echo "⚠️  Found weak password length requirements (< 8 chars)"
            ISSUES_FOUND=1
          fi

          # Check for insecure password storage (plaintext)
          if git grep -iE 'password\s*=\s*(req\.body|user\.password)' -- ':!*.test.*' ':!*.spec.*' 2>/dev/null; then
            echo "⚠️  Found potential plaintext password storage"
            ISSUES_FOUND=1
          fi

          if [ $ISSUES_FOUND -eq 0 ]; then
            echo "✅ No obvious authentication security issues found"
          else
            echo ""
            echo "⚠️  Review authentication patterns above"
            echo "These may be false positives - manual review required"
          fi

  # API security check
  api-security:
    name: API Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for CORS misconfigurations
        run: |
          echo "🔍 Checking for CORS misconfigurations..."
          echo ""

          # Check for overly permissive CORS
          CORS_ISSUES=$(git grep -iE 'origin.*:\s*["\']?\*["\']?' -- ':!*.md' 2>/dev/null || true)

          if [ -n "$CORS_ISSUES" ]; then
            echo "⚠️  Found potential CORS wildcards (*)"
            echo "$CORS_ISSUES"
            echo ""
            echo "Verify these are not in production code"
          else
            echo "✅ No obvious CORS misconfigurations found"
          fi

      - name: Check for missing rate limiting
        run: |
          echo ""
          echo "🔍 Checking API routes for rate limiting..."
          echo ""

          # Count API routes
          API_ROUTES=$(find apps/*/src -type f -path '*/api/*' -name 'route.ts' 2>/dev/null | wc -l)

          # Count rate limit implementations
          RATE_LIMITED=$(git grep -l 'rateLimit\|rate-limit\|upstash' apps/*/src/*/api/ 2>/dev/null | wc -l || echo "0")

          echo "API routes found: $API_ROUTES"
          echo "Rate limited routes: $RATE_LIMITED"
          echo ""

          if [ "$API_ROUTES" -gt 0 ] && [ "$RATE_LIMITED" -eq 0 ]; then
            echo "⚠️  No rate limiting detected on API routes"
            echo "Consider adding rate limiting to prevent abuse"
          else
            echo "✅ Rate limiting appears to be implemented"
          fi

  # Security summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, secrets-scan, env-security, auth-security, api-security]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Security Audit Summary:"
          echo "======================="
          echo ""
          echo "Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "Secrets Scan: ${{ needs.secrets-scan.result }}"
          echo "Environment Security: ${{ needs.env-security.result }}"
          echo "Auth Security: ${{ needs.auth-security.result }}"
          echo "API Security: ${{ needs.api-security.result }}"
          echo ""

          if [ "${{ needs.dependency-audit.result }}" != "success" ] || \
             [ "${{ needs.secrets-scan.result }}" != "success" ] || \
             [ "${{ needs.env-security.result }}" != "success" ]; then
            echo "❌ Critical security checks failed"
            exit 1
          fi

          echo "✅ All critical security checks passed!"
          echo ""
          echo "Security posture:"
          echo "  - No critical/high vulnerabilities"
          echo "  - No hardcoded secrets"
          echo "  - No committed .env files"

name: Documentation Truth Validation

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - 'packages/*/README.md'
      - '.github/workflows/doc-validation.yml'

jobs:
  validate-truth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.13.0'

      - name: Check for forbidden completion claims
        run: |
          echo "Checking for completion documents without human review..."

          # Get list of added/modified markdown files
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }} | grep -E "\.md$" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No markdown files changed"
            exit 0
          fi

          # Check for COMPLETE.md files without human review
          COMPLETION_FILES=$(echo "$CHANGED_FILES" | grep -iE "(complete|verified|resolved)\.md$" || true)

          if [ -n "$COMPLETION_FILES" ]; then
            echo "Found completion documents:"
            echo "$COMPLETION_FILES"

            for file in $COMPLETION_FILES; do
              if [ -f "$file" ]; then
                # Check if file has human review section
                if ! grep -q "reviewDate.*:" "$file" || ! grep -q "reviewedBy.*:" "$file"; then
                  echo "❌ ERROR: $file claims completion without human review section"
                  echo ""
                  echo "Completion documents must include:"
                  echo "  - reviewDate: YYYY-MM-DD"
                  echo "  - reviewedBy: Name <email>"
                  echo "  - approvalStatus: approved|rejected|pending"
                  exit 1
                fi
              fi
            done
          fi

      - name: Check for grade inflation
        run: |
          echo "Checking for grade claims without verification..."

          # Check for A+ or A- grades with scores 9.0+
          if git diff origin/${{ github.base_ref }} | grep -E "\+.*A[\+\-].*\([9-9]\.[0-9]\/10\)"; then
            echo "❌ ERROR: Grade claims A+/A- with 9.0+/10 require human verification"
            echo ""
            echo "High grades must include human review section with:"
            echo "  - Evidence of actual test results"
            echo "  - Security scan reports"
            echo "  - Code review sign-off"
            exit 1
          fi

          # Check for B+ or B- grades with scores 8.5+
          if git diff origin/${{ github.base_ref }} | grep -E "\+.*B[\+\-].*\(([8-9]\.[5-9]|[9-9]\.[0-9])\/10\)"; then
            echo "⚠️ WARNING: Grade claims B+/B- with 8.5+/10 should have verification"
            echo "Consider adding human review section"
          fi

      - name: Validate automated reports have disclaimers
        run: |
          echo "Checking automated reports for required disclaimers..."

          CHANGED_FILES=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }} | grep -E "\.md$" || true)

          if [ -z "$CHANGED_FILES" ]; then
            exit 0
          fi

          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              # Check if file is auto-generated
              if grep -q "Auto-generated\|Generated by\|automation system" "$file"; then
                echo "Checking automated report: $file"

                # Check for required disclaimer
                if ! grep -q "⚠️ AUTOMATED ANALYSIS ONLY - NOT VERIFIED BY HUMANS" "$file"; then
                  echo "❌ ERROR: $file is automated but missing required disclaimer"
                  echo ""
                  echo "All automated reports must include:"
                  echo "  ⚠️ AUTOMATED ANALYSIS ONLY - NOT VERIFIED BY HUMANS"
                  exit 1
                fi
              fi
            fi
          done

      - name: Check for production-ready claims
        run: |
          echo "Checking for unqualified production-ready claims..."

          # Look for "production ready" or "ready for production" without warnings
          if git diff origin/${{ github.base_ref }} | grep -iE "\+.*(production.ready|ready.for.production)" | grep -v "NOT\|⚠️\|WARNING"; then
            echo "❌ ERROR: Found unqualified 'production ready' claim"
            echo ""
            echo "Production readiness claims must either:"
            echo "  1. Be negated (NOT production ready)"
            echo "  2. Include warning symbols (⚠️)"
            echo "  3. Have full human review section"
            exit 1
          fi

      - name: Check for enterprise-grade claims
        run: |
          echo "Checking for unqualified enterprise-grade claims..."

          # Look for "enterprise-grade" without qualifiers
          if git diff origin/${{ github.base_ref }} | grep -iE "\+.*enterprise.grade" | grep -v "⚠️\|WARNING\|qualified"; then
            echo "⚠️ WARNING: Found 'enterprise-grade' claim"
            echo "Marketing language should be qualified or avoided"
            echo "Consider using specific technical descriptions instead"
          fi

      - name: Summary
        if: success()
        run: |
          echo ""
          echo "✅ Documentation truth validation passed"
          echo ""
          echo "All claims in documentation changes are properly qualified and verified."
